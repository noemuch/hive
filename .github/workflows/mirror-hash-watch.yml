# @hive-protocol: mirror-hash-watch
# ^ Pragma above identifies this file as a closure anchor per NORTHSTAR §2.1 #7.
#   Role "mirror-hash-watch" must appear in PROTOCOL_PATHS.sig.pragma_roles[].

name: Mirror Hash Watch — §9.3 / §13.1 decentralization check

# Polls the 3 authoritative mirrors listed in docs/kb/MIRRORS.md (Radicle /
# IPFS / Codeberg per MIRRORS.md §Mirrors) every 6 hours, fetches the current
# bytes of:
#
#   - docs/kb/NORTHSTAR.md
#   - docs/kb/PROTOCOL_PATHS.sig
#
# from each mirror, computes SHA-256, and compares to the GitHub-hosted origin.
#
# On ANY divergence: opens `priority:critical` + `source:mirror-watch` incident
# issue (dedup by mirror+file), AND posts a banner comment to the month's
# automation-log issue (vars.AUTOMATION_LOG_ISSUE).
#
# Pre-genesis behavior: MIRRORS.md documents mirrors using `<TO-BE-GENERATED-AT-GENESIS>`
# or `<TO-BE-ASSIGNED-AT-GENESIS>` placeholders. When any mirror URL contains
# an unresolved placeholder, this workflow SKIPS that mirror's check and logs
# "pre-genesis mirrors not yet configured". If ALL mirrors are placeholder,
# the whole run exits with a neutral success + notice (no false alarm).
#
# Auth: NOEMUCH_PAT until HPA-scoped tokens exist post-genesis.

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6h
  workflow_dispatch:

concurrency:
  group: mirror-hash-watch
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout origin
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Compute origin SHAs + parse mirrors
        id: compute
        env:
          GH_TOKEN: ${{ secrets.NOEMUCH_PAT }}
        run: |
          set -euo pipefail

          # --- Compute canonical (GitHub origin) SHAs ---
          NORTHSTAR_SHA=""
          SIG_SHA=""
          if [ -f "docs/kb/NORTHSTAR.md" ]; then
            NORTHSTAR_SHA=$(sha256sum docs/kb/NORTHSTAR.md | awk '{print $1}')
          fi
          if [ -f "docs/kb/PROTOCOL_PATHS.sig" ]; then
            SIG_SHA=$(sha256sum docs/kb/PROTOCOL_PATHS.sig | awk '{print $1}')
          else
            echo "::notice::PROTOCOL_PATHS.sig absent on origin — pre-genesis."
          fi

          echo "origin_northstar_sha=$NORTHSTAR_SHA" >> "$GITHUB_OUTPUT"
          echo "origin_sig_sha=$SIG_SHA" >> "$GITHUB_OUTPUT"

          # --- Parse MIRRORS.md ---
          # Detect placeholder patterns (pre-genesis) vs real URLs.
          MIRRORS_MD="docs/kb/MIRRORS.md"
          if [ ! -f "$MIRRORS_MD" ]; then
            echo "::error::docs/kb/MIRRORS.md missing — cannot watch mirrors."
            exit 1
          fi

          # Extract bullet points with URLs per mirror section.
          # Pre-genesis placeholders match: <TO-BE-GENERATED-AT-GENESIS>, <TO-BE-ASSIGNED-AT-GENESIS>.
          all_placeholder="true"
          mirrors_state_file="$RUNNER_TEMP/mirrors.json"
          node -e "
            const fs = require('fs');
            const text = fs.readFileSync('$MIRRORS_MD', 'utf8');
            const placeholderRe = /<TO-BE-[A-Z-]+-AT-GENESIS>/;
            const sections = text.split(/^### Mirror \d+: /m).slice(1);
            const mirrors = sections.map(section => {
              const name = section.split('\n')[0].trim();
              const isPlaceholder = placeholderRe.test(section);
              // Try to extract the primary URL (first https/rad/ipfs reference).
              const urlMatch = section.match(/(https?:\/\/\S+|rad:\S+|ipfs:\/\/\S+)/);
              return {
                name,
                url: urlMatch ? urlMatch[1].replace(/[\`)]$/, '') : null,
                placeholder: isPlaceholder,
              };
            });
            fs.writeFileSync('$mirrors_state_file', JSON.stringify(mirrors, null, 2));
          "
          cat "$mirrors_state_file"

          if jq -e 'any(.placeholder == false)' "$mirrors_state_file" > /dev/null; then
            all_placeholder="false"
          fi
          echo "all_placeholder=$all_placeholder" >> "$GITHUB_OUTPUT"

      - name: Poll mirrors + compare
        id: poll
        if: steps.compute.outputs.all_placeholder == 'false'
        env:
          GH_TOKEN: ${{ secrets.NOEMUCH_PAT }}
          ORIGIN_NORTHSTAR: ${{ steps.compute.outputs.origin_northstar_sha }}
          ORIGIN_SIG: ${{ steps.compute.outputs.origin_sig_sha }}
        run: |
          set -euo pipefail

          divergences_file="$RUNNER_TEMP/divergences.txt"
          : > "$divergences_file"
          mirrors_state_file="$RUNNER_TEMP/mirrors.json"

          fetch_sha() {
            local url="$1"
            local dest="$2"
            # Tolerate 30s timeout per fetch; on failure, return empty.
            curl -sSL --max-time 30 "$url" -o "$dest" 2>/dev/null || return 1
            sha256sum "$dest" | awk '{print $1}'
          }

          # Iterate mirrors
          len=$(jq 'length' "$mirrors_state_file")
          for i in $(seq 0 $((len - 1))); do
            name=$(jq -r ".[$i].name" "$mirrors_state_file")
            url=$(jq -r ".[$i].url" "$mirrors_state_file")
            placeholder=$(jq -r ".[$i].placeholder" "$mirrors_state_file")

            if [ "$placeholder" = "true" ]; then
              echo "::notice::Mirror \"$name\" still placeholder (pre-genesis) — SKIP."
              continue
            fi

            echo "::group::Mirror: $name"
            echo "Base URL: $url"

            # For Codeberg-style git hosts we use the raw path convention; for
            # Radicle/IPFS we rely on the URL already being resolvable to the
            # file root (the operator can encode that in MIRRORS.md). If the
            # URL is a git host, try the raw/main/ pattern first.
            northstar_url=""
            sig_url=""
            case "$url" in
              *codeberg.org*|*github.com*|*gitea*)
                base="${url%/}"
                northstar_url="$base/raw/branch/main/docs/kb/NORTHSTAR.md"
                sig_url="$base/raw/branch/main/docs/kb/PROTOCOL_PATHS.sig"
                ;;
              ipfs://*|https://ipfs.io/*|https://*.ipfs.*|https://gateway.*)
                # IPFS: operator is expected to pin the directory CID and
                # encode URL as the directory gateway; append file path.
                base="${url%/}"
                northstar_url="$base/docs/kb/NORTHSTAR.md"
                sig_url="$base/docs/kb/PROTOCOL_PATHS.sig"
                ;;
              rad:*)
                # Radicle URLs require `rad` CLI to resolve — we cannot fetch
                # from the GH runner without that tooling installed. Record as
                # "unresolvable in this environment" and continue. Post-genesis
                # a hosted gateway URL should be added for HTTP verifiability.
                echo "::warning::Radicle mirror \"$name\" requires rad CLI; HTTP fetch unsupported. SKIP until gateway URL provided."
                echo "::endgroup::"
                continue
                ;;
              *)
                base="${url%/}"
                northstar_url="$base/docs/kb/NORTHSTAR.md"
                sig_url="$base/docs/kb/PROTOCOL_PATHS.sig"
                ;;
            esac

            # NORTHSTAR
            if [ -n "$ORIGIN_NORTHSTAR" ] && [ -n "$northstar_url" ]; then
              mirror_sha=$(fetch_sha "$northstar_url" "$RUNNER_TEMP/mirror-northstar-$i.md" || echo "FETCH_FAILED")
              if [ "$mirror_sha" = "FETCH_FAILED" ] || [ -z "$mirror_sha" ]; then
                echo "::warning::Could not fetch NORTHSTAR from \"$name\" ($northstar_url)."
              elif [ "$mirror_sha" != "$ORIGIN_NORTHSTAR" ]; then
                echo "- **$name** — \`NORTHSTAR.md\` divergence: mirror=\`$mirror_sha\` origin=\`$ORIGIN_NORTHSTAR\`" >> "$divergences_file"
              else
                echo "OK: NORTHSTAR matches on \"$name\""
              fi
            fi

            # PROTOCOL_PATHS.sig (only if origin has it)
            if [ -n "$ORIGIN_SIG" ] && [ -n "$sig_url" ]; then
              mirror_sig_sha=$(fetch_sha "$sig_url" "$RUNNER_TEMP/mirror-sig-$i.bin" || echo "FETCH_FAILED")
              if [ "$mirror_sig_sha" = "FETCH_FAILED" ] || [ -z "$mirror_sig_sha" ]; then
                echo "::warning::Could not fetch PROTOCOL_PATHS.sig from \"$name\" ($sig_url)."
              elif [ "$mirror_sig_sha" != "$ORIGIN_SIG" ]; then
                echo "- **$name** — \`PROTOCOL_PATHS.sig\` divergence: mirror=\`$mirror_sig_sha\` origin=\`$ORIGIN_SIG\`" >> "$divergences_file"
              else
                echo "OK: PROTOCOL_PATHS.sig matches on \"$name\""
              fi
            fi

            echo "::endgroup::"
          done

          if [ -s "$divergences_file" ]; then
            {
              echo "diverged=true"
              echo "report<<EOF_DIV"
              echo "## Mirror divergence detected (§9.3 / §13.1)"
              echo ""
              cat "$divergences_file"
              echo ""
              echo "See MIRRORS.md §Divergence Policy: Steward holding the affected mirror's admin key must publish a signed statement on ≥ 2 independent channels, cosigned by at least one other Steward, within the incident window. Otherwise §8.4 Emergency Response Panel opens."
              echo "EOF_DIV"
            } >> "$GITHUB_OUTPUT"
          else
            echo "diverged=false" >> "$GITHUB_OUTPUT"
            echo "::notice::All configured mirrors match origin."
          fi

      - name: Open divergence incident + log banner
        if: steps.poll.outputs.diverged == 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          github-token: ${{ secrets.NOEMUCH_PAT }}
          script: |
            const report = `${{ steps.poll.outputs.report }}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // Dedup: existing open source:mirror-watch incident?
            const { data: existing } = await github.rest.issues.listForRepo({
              ...context.repo,
              state: 'open',
              labels: 'source:mirror-watch',
              per_page: 20,
            });
            const title = '[MIRROR-DIVERGENCE] NORTHSTAR / PROTOCOL_PATHS.sig drifted across canonical mirrors';
            let targetIssue;
            const dupe = existing.find(i => i.title.startsWith('[MIRROR-DIVERGENCE]'));
            if (dupe) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: dupe.number,
                body: `🔁 Re-detected at ${new Date().toISOString()} — [run](${runUrl})\n\n${report}`,
              });
              targetIssue = dupe.number;
            } else {
              const { data: created } = await github.rest.issues.create({
                ...context.repo,
                title,
                body: `${report}\n\nRun: ${runUrl}\n\n**Escalation**: per MIRRORS.md, the Steward whose mirror diverges must publish a signed statement on ≥ 2 independent channels within the incident window, cosigned by at least one other Steward. Otherwise §8.4 Emergency Response Panel opens.`,
                labels: ['priority:critical', 'source:mirror-watch', 'stop-autonomy'],
                assignees: ['noemuch'],
              });
              targetIssue = created.number;
            }

            // Banner comment on automation log
            const logIssue = parseInt('${{ vars.AUTOMATION_LOG_ISSUE }}', 10);
            if (logIssue) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: logIssue,
                body: `🚨 **MIRROR DIVERGENCE** — incident #${targetIssue} — [run](${runUrl})\n\n${report}`,
              });
            }

            core.setFailed('Mirror divergence detected — see incident issue.');

      - name: Log success
        if: success() && vars.AUTOMATION_LOG_ISSUE != ''
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          github-token: ${{ secrets.NOEMUCH_PAT }}
          script: |
            const logIssue = parseInt('${{ vars.AUTOMATION_LOG_ISSUE }}', 10);
            if (!logIssue) return;
            const allPlaceholder = '${{ steps.compute.outputs.all_placeholder }}' === 'true';
            const body = allPlaceholder
              ? `🟡 **mirror-hash-watch** — pre-genesis mirrors not yet configured (all placeholders in MIRRORS.md). No-op. · [run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
              : `🟢 **mirror-hash-watch** — all configured mirrors in sync with origin. · [run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: logIssue,
              body,
            });
