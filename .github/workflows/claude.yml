name: Claude Code

# Trigger Claude Code when:
#   1. An issue is labeled `agent-ready` (primary workflow — label-gated)
#   2. A collaborator comments `@claude <task>` on an issue or PR
#   3. A collaborator assigns an issue to themselves with body containing `@claude`
#
# Auth: OAuth token from user's Claude Max plan (cost absorbed by subscription).
# Fallback: ANTHROPIC_API_KEY if Max plan not configured.
#
# Safety:
#   - Only OWNER / MEMBER / COLLABORATOR can trigger via @claude (prevents abuse on public repo)
#   - Branch protection on `main` enforces human review before merge
#   - `claude_args` passes model + max_turns; CLAUDE.md allowlist restricts file scope

on:
  issues:
    types: [opened, labeled, assigned]
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    # Gate: fire only on intentional triggers from authorized users
    if: |
      (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'agent-ready')
      ||
      (github.event_name == 'issues' && github.event.action == 'opened' &&
       contains(github.event.issue.body, '@claude') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association))
      ||
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '@claude') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
      ||
      (github.event_name == 'pull_request_review' &&
       contains(github.event.review.body, '@claude') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association))
      ||
      (github.event_name == 'pull_request_review_comment' &&
       contains(github.event.comment.body, '@claude') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))

    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Falls back to ANTHROPIC_API_KEY if OAuth not set:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Custom trigger label (default is "claude"):
          label_trigger: "agent-ready"
          trigger_phrase: "@claude"
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 25
