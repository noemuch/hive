name: Preview Gate Watcher

# Polls reactions on "👀 Preview ready" comments (posted by preview-verify)
# to implement the user-facing gate:
#   - 1+ 👍 on a preview comment → merge the referenced PR immediately
#   - 1+ 👎 + comment age > 24h → apply agent-blocked on the PR (escalation)
#   - 0 reactions + comment age > 30 min + PR not merged → merge (silence = approve)
#
# Gates posted by preview-verify.yml on either the PR or its parent initiative.
# Watcher scans both targets so a 👍 on the parent counts for any PR referenced
# in the preview comment body.
#
# Intentionally minimal: no LLM, no new secrets. Pure GH API. Runs every 15 min.

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: preview-gate-watcher
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Poll reactions + act
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.NOEMUCH_PAT }}
          script: |
            const THIRTY_MIN_MS = 30 * 60 * 1000;
            const ONE_DAY_MS = 24 * 60 * 60 * 1000;
            const now = Date.now();

            const prs = await github.paginate(github.rest.pulls.list, {
              ...context.repo, state: 'open', per_page: 100
            });
            const claudePrs = prs.filter(p =>
              p.head && p.head.ref && p.head.ref.startsWith('claude/')
            );
            core.info(`Scanning ${claudePrs.length} open claude/* PRs`);

            for (const pr of claudePrs) {
              // Collect the set of issues where a preview comment might live:
              // the PR itself + any "closes" issue + those issues' parents.
              const targets = new Set([pr.number]);
              try {
                const q = `
                  query($n: Int!) {
                    repository(owner:"${context.repo.owner}", name:"${context.repo.repo}") {
                      pullRequest(number: $n) {
                        closingIssuesReferences(first: 5) {
                          nodes { number parent { number } }
                        }
                      }
                    }
                  }
                `;
                const res = await github.graphql(q, { n: pr.number });
                for (const ci of res.repository.pullRequest.closingIssuesReferences.nodes) {
                  targets.add(ci.number);
                  if (ci.parent) targets.add(ci.parent.number);
                }
              } catch (e) { /* tolerate missing data */ }

              for (const issue_number of targets) {
                let comments;
                try {
                  comments = await github.paginate(github.rest.issues.listComments, {
                    ...context.repo, issue_number, per_page: 100
                  });
                } catch (e) { continue; }

                const previewComments = comments.filter(c =>
                  c.body &&
                  c.body.includes('👀 **Preview ready**') &&
                  c.body.includes(`PR #${pr.number}`)
                );
                if (previewComments.length === 0) continue;

                for (const pc of previewComments) {
                  const age = now - new Date(pc.created_at).getTime();

                  let reactions;
                  try {
                    const r = await github.rest.reactions.listForIssueComment({
                      ...context.repo, comment_id: pc.id
                    });
                    reactions = r.data;
                  } catch (e) { continue; }

                  const up = reactions.filter(r => r.content === '+1').length;
                  const down = reactions.filter(r => r.content === '-1').length;

                  // Skip if PR already merged (reacting on shipped feature is fine)
                  const { data: freshPr } = await github.rest.pulls.get({
                    ...context.repo, pull_number: pr.number
                  });
                  if (freshPr.merged) continue;

                  if (up > 0) {
                    core.info(`PR #${pr.number}: 👍 received — merging`);
                    try {
                      await github.rest.pulls.merge({
                        ...context.repo, pull_number: pr.number,
                        merge_method: 'squash'
                      });
                      await github.rest.issues.createComment({
                        ...context.repo, issue_number,
                        body: `✅ Merged PR #${pr.number} on 👍 from preview gate.`
                      });
                    } catch (e) {
                      core.warning(`Merge failed on PR #${pr.number}: ${e.message}`);
                    }
                    break; // one action per PR per tick
                  }

                  if (down > 0 && age > ONE_DAY_MS) {
                    const { data: prLabels } = await github.rest.issues.listLabelsOnIssue({
                      ...context.repo, issue_number: pr.number
                    });
                    if (prLabels.some(l => l.name === 'agent-blocked')) break;
                    core.warning(`PR #${pr.number}: 👎 + >24h silence — escalating`);
                    try {
                      await github.rest.issues.addLabels({
                        ...context.repo, issue_number: pr.number,
                        labels: ['agent-blocked']
                      });
                      await github.rest.issues.createComment({
                        ...context.repo, issue_number: pr.number,
                        body: `🔴 **24h escalation**: 👎 received on preview but no @claude follow-up. Applied \`agent-blocked\` — surfaces in tomorrow's QA digest. Reopen with an \`@claude\` comment explaining the expected change, or remove \`agent-blocked\` to let the existing PR ship as-is.`
                      });
                    } catch (e) { core.warning(e.message); }
                    break;
                  }

                  if (up === 0 && down === 0 && age > THIRTY_MIN_MS) {
                    core.info(`PR #${pr.number}: silence > 30 min — auto-merging`);
                    try {
                      await github.rest.pulls.merge({
                        ...context.repo, pull_number: pr.number,
                        merge_method: 'squash'
                      });
                    } catch (e) {
                      core.warning(`Silence-merge failed on PR #${pr.number}: ${e.message}`);
                    }
                    break;
                  }
                }
              }
            }
