name: Reviewer Nudge — Re-fire reviewer on stuck DIRTY PRs

# Every 30 min. Finds claude/* PRs where mergeStateStatus is DIRTY (or
# UNKNOWN — GitHub's background merge calculation not yet complete) AND
# no reviewer run fired in the last 60 min. Calls `createWorkflowDispatch`
# on review.yml with the PR number as input.
#
# Why workflow_dispatch (and not empty-commit pushes): pushes made from
# inside a workflow — whether via git CLI or REST API — do NOT reliably
# trigger `pull_request: synchronize` even with a PAT. Verified empirically
# on 2026-04-21 (commit 3a49ebd attributed to @noemuch, zero check runs).
# workflow_dispatch is the documented, reliable path to manually invoke
# another workflow — used by Dependabot, Renovate, and Anthropic's own
# action examples.
#
# review.yml v8 exposes `workflow_dispatch` with `pr_number` input and
# computes PR metadata from either event source in its preflight step.
#
# Skip conditions:
#   - PR labelled stop-autonomy / agent-blocked / autofix-iter-*
#   - mergeStateStatus is CLEAN, BEHIND, BLOCKED, HAS_HOOKS (all handled
#     by other paths)
#   - A reviewer run fired on this branch within the last 60 min

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: reviewer-nudge
  cancel-in-progress: false

jobs:
  nudge:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      pull-requests: read
      issues: write

    steps:
      - name: Dispatch reviewer on stuck DIRTY/UNKNOWN claude/* PRs
        uses: actions/github-script@v7
        env:
          GH_TOKEN: ${{ secrets.NOEMUCH_PAT }}
        with:
          github-token: ${{ secrets.NOEMUCH_PAT }}
          script: |
            const openPrs = await github.paginate(github.rest.pulls.list, {
              ...context.repo, state: 'open', per_page: 100
            });

            const candidates = openPrs.filter(p =>
              p.user && p.user.login === 'noemuch' &&
              p.head && p.head.ref && p.head.ref.startsWith('claude/')
            );

            const oneHourAgo = Date.now() - 60 * 60 * 1000;
            const nudged = [];
            const skipped = [];
            const failed = [];

            for (const pr of candidates) {
              const labels = (pr.labels || []).map(l => l.name);
              if (labels.includes('stop-autonomy') || labels.includes('agent-blocked')) {
                skipped.push(`#${pr.number} (labeled)`);
                continue;
              }
              if (labels.some(n => n.startsWith('autofix-iter-'))) {
                skipped.push(`#${pr.number} (autofix in flight)`);
                continue;
              }

              // Nudge DIRTY (confirmed conflict) AND UNKNOWN (transient state).
              // Skip CLEAN/BEHIND/BLOCKED/HAS_HOOKS — those are handled by
              // the normal reviewer event flow or proactive-rebase.
              let mergeState;
              try {
                const gql = await github.graphql(`
                  query($o:String!, $r:String!, $n:Int!) {
                    repository(owner:$o, name:$r) {
                      pullRequest(number:$n) { mergeStateStatus }
                    }
                  }
                `, { o: context.repo.owner, r: context.repo.repo, n: pr.number });
                mergeState = gql.repository.pullRequest.mergeStateStatus;
              } catch (e) {
                core.warning(`mergeState #${pr.number}: ${e.message}`);
                continue;
              }
              if (mergeState !== 'DIRTY' && mergeState !== 'UNKNOWN') {
                skipped.push(`#${pr.number} (${mergeState})`);
                continue;
              }

              // Skip if a reviewer ran on this branch within the last 60 min
              try {
                const { data: runsData } = await github.rest.actions.listWorkflowRunsForRepo({
                  ...context.repo,
                  branch: pr.head.ref,
                  per_page: 10
                });
                const recentReviewerRuns = (runsData.workflow_runs || []).filter(r =>
                  r.name === 'Claude Code — Autonomous Reviewer' &&
                  new Date(r.created_at).getTime() > oneHourAgo
                );
                if (recentReviewerRuns.length > 0) {
                  skipped.push(`#${pr.number} (reviewer ran <60min ago)`);
                  continue;
                }
              } catch (e) {
                core.warning(`runs lookup #${pr.number}: ${e.message}`);
              }

              // Dispatch review.yml with this PR number
              try {
                await github.rest.actions.createWorkflowDispatch({
                  ...context.repo,
                  workflow_id: 'review.yml',
                  ref: 'main',
                  inputs: { pr_number: String(pr.number) }
                });
                nudged.push(`#${pr.number}`);
              } catch (e) {
                failed.push(`#${pr.number}: ${String(e.message).slice(0, 200)}`);
              }
            }

            core.info(`Candidates: ${candidates.map(p => '#' + p.number).join(', ') || 'none'}`);
            core.info(`Nudged (dispatched review.yml): ${nudged.join(', ') || 'none'}`);
            core.info(`Skipped (${skipped.length}): ${skipped.join(' | ') || 'none'}`);
            core.info(`Failed: ${failed.join(' | ') || 'none'}`);

            core.setOutput('nudged_count', nudged.length);
            core.setOutput('failed_count', failed.length);

            if (nudged.length || failed.length) {
              const body = [
                `👋 **Reviewer nudge** — [${new Date().toISOString()}]`,
                nudged.length ? `✅ Dispatched review.yml for: ${nudged.join(', ')}` : null,
                failed.length ? `⚠️ Failed: ${failed.join(' · ')}` : null,
                `[run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
              ].filter(Boolean).join('\n\n');
              await github.rest.issues.createComment({
                ...context.repo, issue_number: 257, body
              });
            }
