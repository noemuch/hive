name: Claude Code — Autonomous Reviewer

# Reviewer workflow (v7 — 2026-04-20):
#   - Opus 4.7 + superpowers (plugin pinned to commit bb77301)
#   - Iteration count via PR labels (autofix-iter-1/2/3) — survives rebase
#   - Concurrency group prevents parallel reviewers on same PR
#   - Pre-flight secret check
#   - FULL MERGE AUTHORITY: Claude merges every clean PR (no path restrictions)
#   - Auto-fix mode for lint/type/simple test errors
#
# Auth: NOEMUCH_PAT — appears as @noemuch.
# LLM: Opus 4.7 via Lyse primary, Finary secondary failover on quota.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: reviewer-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  preflight:
    # Skip if killed, already blocked, or PR is from a non-Claude source.
    # Filter on branch prefix `claude/` so manual @noemuch PRs don't trigger autonomous review.
    if: |
      !contains(github.event.pull_request.labels.*.name, 'stop-autonomy')
      && !contains(github.event.pull_request.labels.*.name, 'agent-blocked')
      && github.event.pull_request.user.login == 'noemuch'
      && startsWith(github.event.pull_request.head.ref, 'claude/')

    runs-on: ubuntu-latest
    outputs:
      iter: ${{ steps.iter.outputs.n }}
      capped: ${{ steps.iter.outputs.capped }}

    steps:
      - name: Secret sanity
        env:
          PAT: ${{ secrets.NOEMUCH_PAT }}
          PRIMARY: ${{ secrets.CLAUDE_OAUTH_PRIMARY }}
          SECONDARY: ${{ secrets.CLAUDE_OAUTH_SECONDARY }}
        run: |
          set -euo pipefail
          MISSING=()
          [ -z "$PAT" ] && MISSING+=("NOEMUCH_PAT")
          [ -z "$PRIMARY" ] && MISSING+=("CLAUDE_OAUTH_PRIMARY")
          [ -z "$SECONDARY" ] && MISSING+=("CLAUDE_OAUTH_SECONDARY")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error title=Missing secrets::${MISSING[*]}"
            exit 1
          fi
          echo "::notice::All secrets present."

      - name: Iteration count via labels
        id: iter
        env:
          GH_TOKEN: ${{ secrets.NOEMUCH_PAT }}
        run: |
          set -euo pipefail
          PR=${{ github.event.pull_request.number }}
          N=$(gh pr view $PR --repo noemuch/hive --json labels --jq '[.labels[].name | select(startswith("autofix-iter-"))] | length')
          echo "n=$N" >> "$GITHUB_OUTPUT"
          if [ "$N" -ge 3 ]; then
            echo "capped=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Iteration cap (3) reached on PR #$PR"
            gh pr edit $PR --repo noemuch/hive --add-label agent-blocked
            gh pr comment $PR --repo noemuch/hive --body "🔴 **Autofix cap reached** (3 iterations). @noemuch please look. \`agent-blocked\` applied."
          else
            echo "capped=false" >> "$GITHUB_OUTPUT"
          fi

  review:
    needs: preflight
    if: needs.preflight.outputs.capped != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
      checks: write

    steps:
      - name: Checkout PR head with full history (for rebase + log analysis)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.NOEMUCH_PAT }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Run reviewer (primary = Lyse)
        id: primary
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.NOEMUCH_PAT }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_OAUTH_PRIMARY }}
          trigger_phrase: "@claude-reviewer"
          track_progress: true
          use_sticky_comment: true
          display_report: true
          plugin_marketplaces: |
            https://github.com/anthropics/claude-plugins-official.git
          plugins: |
            superpowers@claude-plugins-official
          prompt: |
            You are the autonomous **reviewer + fixer** for PR #${{ github.event.pull_request.number }}.
            Opus 4.7 + `superpowers:requesting-code-review`. Authenticated as @noemuch via PAT.

            Iteration count for this PR: ${{ needs.preflight.outputs.iter }}/3.
            (If you push fixes, also apply label `autofix-iter-<next>` to count properly.)

            Your job: review rigorously, AUTO-FIX mechanical issues yourself, MERGE if clean.
            Noé trusts your judgment — full merge authority on EVERY path.

            ## STEP 0 — Load skills + context

            ```bash
            /superpowers
            cat CLAUDE.md
            gh pr view ${{ github.event.pull_request.number }} --json title,body,additions,deletions,files,mergeStateStatus,statusCheckRollup
            gh pr diff ${{ github.event.pull_request.number }}
            gh pr checks ${{ github.event.pull_request.number }}
            ```

            ## STEP 1 — Rebase if BEHIND main

            If `mergeStateStatus = BEHIND`:
            ```bash
            git config user.name "Noé Chagué"
            git config user.email "noe@finary.com"
            git fetch origin main
            git rebase origin/main
            ```
            - Clean rebase → `git push --force-with-lease origin HEAD` + comment "🔀 Rebased on main"
            - Conflict → `git rebase --abort` + apply `agent-blocked` + comment "Conflict — @noemuch needs manual resolve" + EXIT.

            ## STEP 2 — CI status check first

            If `gh pr checks` shows any FAILURE → go directly to STEP 4 (auto-fix mode).
            If CI is in progress → wait via `gh pr checks --watch` (max 2 min) then re-evaluate.

            ## STEP 3 — Quality Gate (10 checks per CLAUDE.md § "Quality Gate")

            Run each grep against the diff. Record file:line of any match. List the 10 checks in your sticky comment with ✅/❌.

            Also verify the PR body contains a `## Methodology` block listing at least 2 invoked superpowers skills (or `trivial-task` label is applied). If missing → ❌ Methodology violation.

            ## STEP 4 — Decide + execute

            ### A. Quality Gate 0/10 + Methodology block present + CI green → AUTO-MERGE
            ```bash
            gh pr comment ${{ github.event.pull_request.number }} --body "✅ **Review passed** — Quality Gate 0/10, Methodology present, CI green. Auto-merging.

            **Summary**: <2-3 lines>
            **Methodology**: Opus 4.7 + superpowers:requesting-code-review"
            gh pr merge ${{ github.event.pull_request.number }} --auto --squash --delete-branch
            ```

            ### B. AUTO-FIX MODE — for mechanical issues only:
            - ESLint/TypeScript errors with obvious fix
            - Missing imports
            - Outdated test snapshots
            - Typos/formatting
            - Missing Methodology block in PR body (just edit the body, don't re-run builder)

            Process:
            1. Apply `superpowers:systematic-debugging` to identify root cause
            2. Edit/Write the fix
            3. Run `bun test` and `bun run lint` locally if feasible
            4. Stage + commit with message starting "🔧 Autofix: <what>"
            5. Apply label `autofix-iter-<N>` where N = ${{ needs.preflight.outputs.iter }} + 1
            6. `git push origin HEAD`
            7. Post sticky comment: "🔧 **Autofix iter N/3**: <what was fixed>. CI re-running."

            DO NOT use `gh pr review --request-changes` here — you're fixing, not requesting.

            ### C. ESCALATE TO @NOEMUCH (only if):
            - Architectural decision needed (two valid approaches)
            - Ambiguous requirements (use `superpowers:brainstorming` to ask)
            - Security design red flag you can't self-fix
            - 3+ iterations failed (already capped at preflight)

            ```bash
            gh pr edit ${{ github.event.pull_request.number }} --add-label agent-blocked
            gh pr merge ${{ github.event.pull_request.number }} --disable-auto 2>/dev/null || true
            gh pr comment ${{ github.event.pull_request.number }} --body "🔴 **Escalation to @noemuch**: <why human judgment needed>. \`agent-blocked\` applied."
            ```

            ## STYLE

            - Concise. Senior voice.
            - Inline refs `path/to/file.ts:42`
            - Comments < 300 words
            - Lean toward AUTO-MERGE or AUTO-FIX. Escalate only if genuinely ambiguous/architectural.
            - You have full merge authority. No path restrictions. Trust your judgment.

            GO. Max 75 turns.
          claude_args: |
            --model claude-opus-4-7
            --max-turns 75
            --dangerously-skip-permissions

      - name: Detect quota error
        id: quota
        if: steps.primary.outcome == 'failure'
        run: |
          # Same heuristic as builder workflow.
          echo "is_quota=true" >> "$GITHUB_OUTPUT"
          echo "::notice title=Reviewer failover::Primary failed; attempting secondary."

      - name: Run reviewer (failover = Finary)
        if: steps.primary.outcome == 'failure' && steps.quota.outputs.is_quota == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.NOEMUCH_PAT }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_OAUTH_SECONDARY }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude-reviewer"
          track_progress: true
          use_sticky_comment: true
          display_report: true
          plugin_marketplaces: |
            https://github.com/anthropics/claude-plugins-official.git
          plugins: |
            superpowers@claude-plugins-official
          prompt: |
            [FAILOVER] Same reviewer role as primary prompt above.
            Iteration: ${{ needs.preflight.outputs.iter }}/3 for PR #${{ github.event.pull_request.number }}.
            Re-execute STEP 0 → STEP 4 from the reviewer spec in CLAUDE.md.
            GO. Max 75 turns.
          claude_args: |
            --model claude-opus-4-7
            --max-turns 75
            --dangerously-skip-permissions

      - name: Post review summary to automation log (#257)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.NOEMUCH_PAT }}
        run: |
          set -euo pipefail
          PR="${{ github.event.pull_request.number }}"
          ITER="${{ needs.preflight.outputs.iter }}"
          OUTCOME="${{ steps.primary.outcome }}"
          gh issue comment 257 --repo noemuch/hive --body "🔍 **Reviewer run** for PR #${PR} — iter \`${ITER}/3\` — primary: \`${OUTCOME}\` — failover: \`${{ steps.quota.outputs.is_quota || 'no' }}\` — [run](https://github.com/noemuch/hive/actions/runs/${{ github.run_id }})" || true
