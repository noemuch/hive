name: Claude Code — Autonomous Reviewer

# Autonomous review workflow for PRs opened by Claude Code (as @noemuch).
#
# ROLE: a second Claude run (Opus 4.7) reviews every auto-opened PR,
# decides auto-merge vs block, handles rebase on out-of-date PRs.
#
# Decision tree:
#   A. Clean review + safe path     → enables auto-merge (PR lands when CI green)
#   B. Clean review + critical path → comments "LGTM, awaiting @noemuch manual merge"
#   C. Issues found on any axis     → posts detailed review + applies `agent-blocked` label
#   D. PR behind main (rebase)       → tries `git rebase origin/main`, force-pushes or blocks
#
# Safety:
#   - Only reviews PRs opened by @noemuch (no infinite loops on its own reviews)
#   - Skips if `agent-blocked` already present (human took over)
#   - Skips if `stop-autonomy` label present (kill-switch)
#
# Spec: see CLAUDE.md § "Autonomous workflow" — auto-merge decision tree

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    # Only review bot-authored PRs, skip if already blocked or killed
    if: |
      github.event.pull_request.user.login == 'noemuch'
      && !contains(github.event.pull_request.labels.*.name, 'agent-blocked')
      && !contains(github.event.pull_request.labels.*.name, 'stop-autonomy')

    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write            # needed for rebase + force-push
      pull-requests: write
      issues: write
      id-token: write
      actions: read
      checks: write

    steps:
      - name: Checkout PR head with full history (for rebase)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.NOEMUCH_PAT }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Run Claude Code reviewer
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.NOEMUCH_PAT }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # We drive via prompt — not via trigger_phrase or label_trigger
          trigger_phrase: "@claude-reviewer"

          track_progress: true
          use_sticky_comment: true
          display_report: true

          plugin_marketplaces: |
            https://github.com/anthropics/claude-plugins-official.git
          plugins: |
            superpowers@claude-plugins-official

          prompt: |
            You are the **autonomous reviewer** for PR #${{ github.event.pull_request.number }}.

            This PR was authored by Claude Code (appearing as @noemuch via PAT).
            Your job: apply `superpowers:code-reviewer` rigorously and decide
            the PR's fate.

            ## STEP 1 — Read context

            ```bash
            # PR details
            gh pr view ${{ github.event.pull_request.number }} --json title,body,headRefName,baseRefName,additions,deletions,files,mergeStateStatus

            # Diff
            gh pr diff ${{ github.event.pull_request.number }}

            # Linked issue (extract N from "Closes #N" in PR body)
            # Then: gh issue view N

            # Repo rules
            cat CLAUDE.md
            ```

            ## STEP 2 — Handle out-of-date / rebase (before reviewing)

            If `mergeStateStatus` is `BEHIND` or you see "out-of-date":
            1. Attempt clean rebase:
               ```bash
               git config user.name "Noé Chagué"
               git config user.email "noe@finary.com"
               git fetch origin main
               git rebase origin/main
               ```
            2. If rebase succeeds cleanly:
               - `git push --force-with-lease origin HEAD`
               - Post sticky comment: "🔀 Rebased on main (no conflicts). Re-reviewing..."
               - Then re-read diff and proceed to STEP 3
            3. If rebase has conflicts:
               - `git rebase --abort`
               - Apply `agent-blocked` label: `gh issue edit ${{ github.event.pull_request.number }} --add-label agent-blocked`
               - Post sticky comment: "🔴 Merge conflict with main — @noemuch needs to resolve manually. PR blocked."
               - `gh pr merge --disable-auto` if auto-merge was previously enabled
               - Exit.

            ## STEP 3 — Review the 7 axes (apply superpowers:code-reviewer)

            1. **Correctness** — does the PR meet the acceptance criteria from linked issue?
            2. **CLAUDE.md compliance** — Bun, raw SQL, TypeScript strict, zero LLM server-side, respects allowlist?
            3. **Scope discipline** — stayed within the linked issue (no scope creep)?
            4. **Code quality** — clear naming, minimal comments, no dead code, idiomatic TS/Bun?
            5. **Security** — no obvious vulns (SQLi, XSS, secrets in code, auth bypass)?
            6. **Tests** — coverage for new behaviour? Existing tests not broken?
            7. **Self-review quality** — did the author (builder Claude) document reasoning, plans, decisions?

            ## STEP 4 — Decide + execute

            First, list touched paths:
            ```bash
            gh pr view ${{ github.event.pull_request.number }} --json files --jq '.files[].path'
            ```

            Classify:
            - 🟢 **SAFE PATHS** (auto-merge eligible): `docs/**`, `web/**`, `scripts/**`, `**/__tests__/**`, `**/*.test.ts`, `**/*.spec.ts`, `package.json` (dev-deps only)
            - 🔴 **CRITICAL PATHS** (require human merge): `server/src/auth/**`, `server/migrations/**`, `server/src/engine/peer-evaluation.ts`, `server/src/db/agent-score-state.ts`, `agents/lib/agent.ts`, `server/src/protocol/**`, `CLAUDE.md`, `.github/workflows/**`

            Then decide:

            **A. Review CLEAN + all paths SAFE:**
            ```bash
            gh pr review ${{ github.event.pull_request.number }} --comment --body "✅ **Autonomous review passed** — 7/7 axes clean. Auto-merge enabled (safe paths only). Will merge to main when CI green.

            **Summary**: <2-3 line summary of what the PR does>
            **Methodology**: superpowers:code-reviewer — <which axes were notable>"

            gh pr merge ${{ github.event.pull_request.number }} --auto --squash --delete-branch
            ```

            **B. Review CLEAN + at least one CRITICAL path:**
            ```bash
            gh pr review ${{ github.event.pull_request.number }} --comment --body "✅ **Autonomous review passed** — 7/7 axes clean.

            **⚠️ Touches critical path(s)**: <list>. Auto-merge NOT enabled — @noemuch manual merge required per CLAUDE.md allowlist.

            **Summary**: <what the PR does>"

            # Do NOT enable auto-merge.
            ```

            **C. ISSUES FOUND (any axis fails):**
            ```bash
            gh issue edit ${{ github.event.pull_request.number }} --add-label agent-blocked
            gh pr merge ${{ github.event.pull_request.number }} --disable-auto 2>/dev/null || true
            gh pr review ${{ github.event.pull_request.number }} --request-changes --body "🔴 **Autonomous review — changes requested**

            ## Issues found

            <numbered list, one per axis that failed, be specific with file:line references>

            ## Methodology

            Applied superpowers:code-reviewer — the above issues are blockers for auto-merge.

            @noemuch — label \`agent-blocked\` applied. Unlabel + push fixes to re-trigger review, or take over manually."
            ```

            ## STYLE

            - Concise. Senior reviewer voice. Professional.
            - Inline references: `path/to/file.ts:42`
            - Review comment under 300 words unless critical findings
            - Don't be nitpicky on style — focus on material quality / correctness / security
            - Don't re-implement — you are reviewing, not rewriting

            GO.

          claude_args: |
            --model claude-opus-4-7
            --max-turns 35
            --allowed-tools "Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh pr review:*),Bash(gh pr merge:*),Bash(gh issue view:*),Bash(gh issue edit:*),Bash(gh issue comment:*),Bash(gh api:*),Bash(git:*),Bash(cat:*),Bash(ls:*),Bash(grep:*),Bash(find:*),Bash(pwd),Read,Grep,Glob"
