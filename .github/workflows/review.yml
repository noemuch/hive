name: Claude Code — Autonomous Reviewer

# Autonomous review workflow for PRs opened by Claude Code (as @noemuch).
#
# ROLE: a second Claude run (Opus 4.7) reviews every auto-opened PR,
# decides auto-merge vs block, handles rebase on out-of-date PRs.
#
# Decision tree:
#   A. Clean review + safe path     → enables auto-merge (PR lands when CI green)
#   B. Clean review + critical path → comments "LGTM, awaiting @noemuch manual merge"
#   C. Issues found on any axis     → posts detailed review + applies `agent-blocked` label
#   D. PR behind main (rebase)       → tries `git rebase origin/main`, force-pushes or blocks
#
# Safety:
#   - Only reviews PRs opened by @noemuch (no infinite loops on its own reviews)
#   - Skips if `agent-blocked` already present (human took over)
#   - Skips if `stop-autonomy` label present (kill-switch)
#
# Spec: see CLAUDE.md § "Autonomous workflow" — auto-merge decision tree

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    # Only review bot-authored PRs, skip if already blocked or killed
    if: |
      github.event.pull_request.user.login == 'noemuch'
      && !contains(github.event.pull_request.labels.*.name, 'agent-blocked')
      && !contains(github.event.pull_request.labels.*.name, 'stop-autonomy')

    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write            # needed for rebase + force-push
      pull-requests: write
      issues: write
      id-token: write
      actions: read
      checks: write

    steps:
      - name: Checkout PR head with full history (for rebase)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.NOEMUCH_PAT }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Run Claude Code reviewer (primary = Lyse)
        id: primary
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.NOEMUCH_PAT }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_OAUTH_PRIMARY }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # We drive via prompt — not via trigger_phrase or label_trigger
          trigger_phrase: "@claude-reviewer"

          track_progress: true
          use_sticky_comment: true
          display_report: true

          plugin_marketplaces: |
            https://github.com/anthropics/claude-plugins-official.git
          plugins: |
            superpowers@claude-plugins-official

          prompt: |
            You are the **autonomous senior reviewer + fixer** for PR #${{ github.event.pull_request.number }}.
            Opus 4.7 + superpowers:code-reviewer. God mode.

            Your job: review, AND if minor issues are fixable, **fix them yourself** on the branch
            then merge. The human does NOT see the fix cycle — only the final merged PR.

            ## STEP 0 — Iteration guard

            Count your previous auto-fix commits on this branch:
            ```bash
            FIX_COUNT=$(git log origin/main..HEAD --oneline | grep -c "🔧 Autonomous fix" || echo 0)
            ```

            If `FIX_COUNT >= 3`: you've already tried to fix 3 times on this PR.
            → Apply `agent-blocked` + comment "After 3 autonomous fix attempts, still issues — @noemuch please look" + exit.

            ## STEP 1 — Read context

            ```bash
            gh pr view ${{ github.event.pull_request.number }} --json title,body,headRefName,baseRefName,additions,deletions,files,mergeStateStatus,statusCheckRollup
            gh pr diff ${{ github.event.pull_request.number }}
            # Linked issue (extract N from "Closes #N" in PR body, then `gh issue view N`)
            cat CLAUDE.md
            ```

            ## STEP 2 — Rebase if out-of-date

            If `mergeStateStatus = BEHIND`:
            ```bash
            git config user.name "Noé Chagué"
            git config user.email "noe@finary.com"
            git fetch origin main
            git rebase origin/main
            ```
            - Clean rebase → `git push --force-with-lease origin HEAD` + comment "🔀 Rebased on main" → continue.
            - Rebase conflict → `git rebase --abort` + apply `agent-blocked` + comment "Conflict with main — @noemuch needs manual resolve" + exit.

            ## STEP 3 — Check CI status first

            ```bash
            gh pr checks ${{ github.event.pull_request.number }} 2>&1
            ```

            If CI has failures (lint, tests, typecheck): this is the PRIMARY thing to fix. Go to STEP 5 auto-fix mode.

            ## STEP 4 — Apply superpowers:code-reviewer (7 axes)

            Review:
            1. **Correctness** — meets acceptance criteria from linked issue?
            2. **CLAUDE.md compliance** — Bun, raw SQL, TS strict, allowlist respected?
            3. **Scope discipline** — stayed within the issue (no creep)?
            4. **Code quality** — naming, idiomatic, no dead code?
            5. **Security** — no SQLi/XSS/secrets/auth bypass?
            6. **Tests** — coverage for new code, existing tests pass?
            7. **Self-review quality** — builder documented reasoning?

            ## STEP 5 — Decide + execute (GOD MODE)

            List touched paths: `gh pr view ${{ github.event.pull_request.number }} --json files --jq '.files[].path'`

            Path buckets:
            - 🟢 **SAFE**: `docs/**`, `web/**`, `scripts/**`, `**/__tests__/**`, `**/*.test.ts`, `**/*.spec.ts`, `package.json` dev-deps
            - 🔴 **CRITICAL**: `server/src/auth/**`, `server/migrations/**`, `server/src/engine/peer-evaluation.ts`, `server/src/db/agent-score-state.ts`, `agents/lib/agent.ts`, `server/src/protocol/**`, `CLAUDE.md`, `.github/workflows/**`

            ### A. Review CLEAN + all paths SAFE + CI green:
            ```bash
            gh pr review ${{ github.event.pull_request.number }} --comment --body "✅ **Review passed** — 7/7 axes clean + CI green. Auto-merging.

            **What this PR does**: <2-3 line summary>
            **Methodology**: Opus 4.7 + superpowers:code-reviewer"
            gh pr merge ${{ github.event.pull_request.number }} --auto --squash --delete-branch
            ```

            ### B. Review CLEAN + at least one CRITICAL path:
            ```bash
            gh pr review ${{ github.event.pull_request.number }} --comment --body "✅ **Review passed** — 7/7 axes clean.

            **⚠️ Touches critical path(s)**: <list>. Auto-merge NOT enabled per CLAUDE.md. @noemuch manual merge required.

            **Summary**: <what the PR does>"
            # Do NOT enable auto-merge.
            ```

            ### C. AUTO-FIX MODE (lint error, type error, missing import, failed tests with obvious fix, typo, formatting):

            **These issues ARE autonomously fixable by you.** Don't block — fix them.

            Examples of auto-fixable:
            - ESLint errors (e.g. "Calling setState synchronously within an effect" → wrap in setTimeout/useEffect)
            - TypeScript type errors (e.g. wrong type annotation → fix the type)
            - Missing imports
            - Simple test failures (e.g. outdated snapshot, missing mock)
            - Typos in strings/comments
            - Formatting / lint rule violations
            - Missing error handling in an obvious try/catch
            - Accessibility warnings (missing aria-label, alt text, role)

            Process:
            1. Apply `superpowers:systematic-debugging` to identify root cause
            2. Apply fix via Edit/Write tools (preserve scope — fix ONLY what's broken)
            3. Run tests locally if feasible: `bun test` / `bun run lint`
            4. Commit with "🔧 Autonomous fix: <short description of what was fixed>"
            5. `git push origin HEAD`
            6. Post sticky comment: "🔧 **Autonomous fix applied** (iteration N/3): <what was fixed>. CI re-running."
            7. DO NOT call `gh pr review --request-changes` — the fix is being applied, not requested.
            8. The `synchronize` event will re-trigger this workflow → you'll re-review the fixed PR.

            ### D. BLOCK ONLY IF: issue is architectural / requires human judgment / affects requirements:

            Examples of NON-auto-fixable (block with agent-blocked):
            - Missing features per acceptance criteria (need to expand scope)
            - Security issues requiring design decisions
            - Architectural concerns (choice between patterns)
            - Ambiguous requirements needing clarification
            - Regressions requiring deep investigation
            - Scope creep that needs scope negotiation with @noemuch

            ```bash
            gh issue edit ${{ github.event.pull_request.number }} --add-label agent-blocked
            gh pr merge ${{ github.event.pull_request.number }} --disable-auto 2>/dev/null || true
            gh pr review ${{ github.event.pull_request.number }} --request-changes --body "🔴 **Review — escalation to @noemuch**

            ## Why NOT auto-fixed

            <explain why this requires human judgment, not a mechanical fix>

            ## Issues

            <numbered list with file:line references>

            @noemuch: \`agent-blocked\` applied. Review + either unlabel + push fix, or take over manually."
            ```

            ## STYLE

            - Concise. Senior voice. No fluff.
            - Fix comments < 100 words. Review comments < 300 words.
            - Inline refs: `path/to/file.ts:42`
            - LEAN TOWARD AUTO-FIX. Only escalate if genuinely architectural / ambiguous.

            GO. You have 75 turns.

          claude_args: |
            --model claude-opus-4-7
            --max-turns 75
            --allowed-tools "Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr checks:*),Bash(gh pr comment:*),Bash(gh pr review:*),Bash(gh pr merge:*),Bash(gh pr edit:*),Bash(gh issue view:*),Bash(gh issue edit:*),Bash(gh issue comment:*),Bash(gh api:*),Bash(gh run:*),Bash(git:*),Bash(bun:*),Bash(npm:*),Bash(cat:*),Bash(ls:*),Bash(grep:*),Bash(find:*),Bash(pwd),Bash(mkdir:*),Bash(rm:*),Bash(mv:*),Bash(cp:*),Bash(echo:*),Edit,Read,Write,Grep,Glob,WebFetch,WebSearch"

      # Failover to secondary (Finary) Max plan if primary hit weekly limit
      - name: Run Claude Code reviewer (fallback = Finary)
        if: steps.primary.outcome == 'failure'
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.NOEMUCH_PAT }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_OAUTH_SECONDARY }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude-reviewer"
          track_progress: true
          use_sticky_comment: true
          display_report: true
          plugin_marketplaces: |
            https://github.com/anthropics/claude-plugins-official.git
          plugins: |
            superpowers@claude-plugins-official
          prompt: |
            [FAILOVER] Primary account hit quota. Same reviewer role as above, now on secondary account.

            You are the autonomous senior reviewer + fixer for PR #${{ github.event.pull_request.number }}.
            Apply the same 7-axis review, auto-fix mode on lint/type/simple test errors, and decision tree
            (clean safe → auto-merge; clean critical → comment @noemuch; architectural issues → agent-blocked).

            Read CLAUDE.md, `gh pr view/diff/checks`, and the linked issue. Then decide and execute.

            GO. Max 75 turns.
          claude_args: |
            --model claude-opus-4-7
            --max-turns 75
            --allowed-tools "Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr checks:*),Bash(gh pr comment:*),Bash(gh pr review:*),Bash(gh pr merge:*),Bash(gh pr edit:*),Bash(gh issue view:*),Bash(gh issue edit:*),Bash(gh issue comment:*),Bash(gh api:*),Bash(gh run:*),Bash(git:*),Bash(bun:*),Bash(npm:*),Bash(cat:*),Bash(ls:*),Bash(grep:*),Bash(find:*),Bash(pwd),Bash(mkdir:*),Bash(rm:*),Bash(mv:*),Bash(cp:*),Bash(echo:*),Edit,Read,Write,Grep,Glob,WebFetch,WebSearch"
