name: Claude Code — Autonomous Reviewer

# Reviewer workflow (v8 — 2026-04-21):
#   - Opus 4.7 + superpowers (plugin pinned to commit bb77301)
#   - Iteration count via PR labels (autofix-iter-1/2/3) — survives rebase
#   - Concurrency group prevents parallel reviewers on same PR
#   - Pre-flight secret + metadata computation
#   - FULL MERGE AUTHORITY: Claude merges every clean PR (no path restrictions)
#   - Auto-fix mode for lint/type/simple test errors
#   - STEP 1.5: autonomous conflict resolution (3/3/3 budget)
#   - Dual entry points: pull_request (natural) + workflow_dispatch (manual/nudge)
#
# Auth: NOEMUCH_PAT — appears as @noemuch.
# LLM: Opus 4.7 via Lyse primary, Finary secondary failover on quota.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to review
        required: true
        type: number

concurrency:
  group: reviewer-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.meta.outputs.pr_number }}
      head_ref: ${{ steps.meta.outputs.head_ref }}
      head_sha: ${{ steps.meta.outputs.head_sha }}
      iter: ${{ steps.iter.outputs.n }}
      capped: ${{ steps.iter.outputs.capped }}
      should_skip: ${{ steps.meta.outputs.should_skip }}

    steps:
      - name: Secret sanity
        env:
          PAT: ${{ secrets.NOEMUCH_PAT }}
          PRIMARY: ${{ secrets.CLAUDE_OAUTH_PRIMARY }}
          SECONDARY: ${{ secrets.CLAUDE_OAUTH_SECONDARY }}
        run: |
          set -euo pipefail
          MISSING=()
          [ -z "$PAT" ] && MISSING+=("NOEMUCH_PAT")
          [ -z "$PRIMARY" ] && MISSING+=("CLAUDE_OAUTH_PRIMARY")
          [ -z "$SECONDARY" ] && MISSING+=("CLAUDE_OAUTH_SECONDARY")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error title=Missing secrets::${MISSING[*]}"
            exit 1
          fi
          echo "::notice::All secrets present."

      - name: Resolve PR metadata + filter
        id: meta
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.NOEMUCH_PAT }}
          script: |
            // Resolve pr_number from either event source
            let prNumber;
            if (context.eventName === 'pull_request') {
              prNumber = context.payload.pull_request.number;
            } else if (context.eventName === 'workflow_dispatch') {
              prNumber = parseInt(context.payload.inputs.pr_number, 10);
            } else {
              core.setFailed(`Unsupported event: ${context.eventName}`);
              return;
            }

            // Fetch PR details (works for both event sources)
            const { data: pr } = await github.rest.pulls.get({
              ...context.repo, pull_number: prNumber
            });

            core.setOutput('pr_number', prNumber);
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('head_sha', pr.head.sha);

            // Filters — skip if not a claude/ PR by @noemuch or labeled kill/blocked
            const labels = (pr.labels || []).map(l => l.name);
            const reasons = [];
            if (labels.includes('stop-autonomy')) reasons.push('stop-autonomy label');
            if (labels.includes('agent-blocked')) reasons.push('agent-blocked label');
            if (pr.user.login !== 'noemuch') reasons.push(`author=${pr.user.login}`);
            if (!pr.head.ref.startsWith('claude/')) reasons.push(`branch=${pr.head.ref}`);

            if (reasons.length > 0) {
              core.setOutput('should_skip', 'true');
              core.notice(`Skipping review for PR #${prNumber}: ${reasons.join(', ')}`);
            } else {
              core.setOutput('should_skip', 'false');
            }

      - name: Iteration count via labels
        id: iter
        if: steps.meta.outputs.should_skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.NOEMUCH_PAT }}
          PR: ${{ steps.meta.outputs.pr_number }}
        run: |
          set -euo pipefail
          N=$(gh pr view "$PR" --repo noemuch/hive --json labels --jq '[.labels[].name | select(startswith("autofix-iter-"))] | length')
          echo "n=$N" >> "$GITHUB_OUTPUT"
          if [ "$N" -ge 3 ]; then
            echo "capped=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Iteration cap (3) reached on PR #$PR"
            gh pr edit "$PR" --repo noemuch/hive --add-label agent-blocked
            gh pr comment "$PR" --repo noemuch/hive --body "🔴 **Autofix cap reached** (3 iterations). @noemuch please look. \`agent-blocked\` applied."
          else
            echo "capped=false" >> "$GITHUB_OUTPUT"
          fi

  review:
    needs: preflight
    if: needs.preflight.outputs.should_skip != 'true' && needs.preflight.outputs.capped != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
      checks: write

    steps:
      - name: Checkout PR head with full history (for rebase + log analysis)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.NOEMUCH_PAT }}
          ref: ${{ needs.preflight.outputs.head_ref }}
          fetch-depth: 0

      - name: Run reviewer (primary = Lyse)
        id: primary
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.NOEMUCH_PAT }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_OAUTH_PRIMARY }}
          trigger_phrase: "@claude-reviewer"
          track_progress: ${{ github.event_name == 'pull_request' }}
          use_sticky_comment: ${{ github.event_name == 'pull_request' }}
          display_report: true
          plugin_marketplaces: |
            https://github.com/anthropics/claude-plugins-official.git
          plugins: |
            superpowers@claude-plugins-official
          prompt: |
            You are the autonomous **reviewer + fixer** for PR #${{ needs.preflight.outputs.pr_number }}.
            Opus 4.7 + `superpowers:requesting-code-review`. Authenticated as @noemuch via PAT.

            Iteration count for this PR: ${{ needs.preflight.outputs.iter }}/3.
            (If you push fixes, also apply label `autofix-iter-<next>` to count properly.)

            Your job: review rigorously, AUTO-FIX mechanical issues yourself, MERGE if clean.
            Noé trusts your judgment — full merge authority on EVERY path.

            ## STEP 0 — Load skills + context

            ```bash
            /superpowers
            cat CLAUDE.md
            gh pr view ${{ needs.preflight.outputs.pr_number }} --json title,body,additions,deletions,files,mergeStateStatus,statusCheckRollup
            gh pr diff ${{ needs.preflight.outputs.pr_number }}
            gh pr checks ${{ needs.preflight.outputs.pr_number }}
            ```

            ## STEP 1 — Rebase if BEHIND main

            If `mergeStateStatus = BEHIND`:
            ```bash
            git config user.name "Noé Chagué"
            git config user.email "noe@finary.com"
            git fetch origin main
            git rebase origin/main
            ```
            - Clean rebase → `git push --force-with-lease origin HEAD` + comment "🔀 Rebased on main" → continue to STEP 2.
            - Conflict → proceed to STEP 1.5 (autonomous conflict resolution) BEFORE aborting.

            ## STEP 1.5 — Autonomous conflict resolution (when rebase produces conflicts)

            This step activates if `git rebase origin/main` (STEP 1) or `mergeStateStatus = DIRTY` (from `gh pr view`). You are authorized to resolve conflicts autonomously — Noé trusts your judgment.

            **HARD BUDGET — abort + escalate if ANY guard trips:**
            - More than 3 unmerged files in a single `git status`
            - More than 3 conflict hunks in a single file (count `<<<<<<<` markers)
            - More than 3 `git rebase --continue` iterations across the whole rebase
            - Any hunk requires semantic judgment (logic overlap, incompatible APIs, changed method signatures)

            **Process:**

            If not already attempted in STEP 1:
            ```bash
            git fetch origin main
            git rebase origin/main || true   # allow conflict
            ```

            Then, while `git status --porcelain | grep -E "^UU|^AA"` shows unmerged files:

            1. **Count the budget:**
               ```bash
               UNMERGED=$(git status --porcelain | grep -E "^UU|^AA" | wc -l)
               if [ "$UNMERGED" -gt 3 ]; then
                 git rebase --abort
                 # → go to ESCALATE block below
               fi
               ```

            2. **For each unmerged file**, apply `superpowers:systematic-debugging` Phase 1 (root cause) and Phase 3 (hypothesis):
               - `git diff <file>` — read the conflict markers
               - Ask yourself: what was the PR's intent (`<<<<<<< HEAD` side)? What changed on main (`>>>>>>>` side)?
               - Count hunks: `grep -c '^<<<<<<<' <file>`. If > 3 → abort + escalate.
               - Can you preserve BOTH intents cleanly (e.g. imports merge, adjacent migrations keep order, non-overlapping test cases coexist)? → resolve mechanically with Edit/Write tool → `git add <file>`.
               - Does resolution require semantic judgment (signature change, behavioral divergence, incompatible APIs)? → `git rebase --abort` + ESCALATE.

            3. **After all files resolved:** `git rebase --continue`. If a second conflict surfaces in the next commit of the stack, repeat from step 1 (budget re-check).

            4. **After max 3 `--continue` iterations total**, regardless of state: `git rebase --abort` + ESCALATE.

            5. **On success:**
               ```bash
               git push --force-with-lease origin HEAD
               gh pr comment ${{ needs.preflight.outputs.pr_number }} --body "🔀 **Auto-rebase resolved N conflicts**:
               - \`path/to/file.ts\`: <1-line summary of how it was merged>
               - (...)

               Applied superpowers:systematic-debugging per file. CI re-running."
               ```
               Then continue to STEP 2.

            **ESCALATE block** (used by any budget trip in this step):
            ```bash
            git rebase --abort 2>/dev/null || true
            gh pr edit ${{ needs.preflight.outputs.pr_number }} --repo noemuch/hive --add-label agent-blocked
            gh pr comment ${{ needs.preflight.outputs.pr_number }} --body "🔴 **Conflict auto-resolve aborted** — <precise reason: e.g. 'file server/src/engine/handlers.ts has 5 conflict hunks (budget: 3)' or 'method signature divergence in auth.ts: HEAD adds verifyJwt(token, audience), main adds verifyJwt(token, {aud})'>. @noemuch needs manual resolve. \`agent-blocked\` applied."
            exit 0
            ```
            Do NOT proceed to STEP 2 after ESCALATE.

            ## STEP 2 — CI status check first

            If `gh pr checks` shows any FAILURE → go directly to STEP 4 (auto-fix mode).
            If CI is in progress → wait via `gh pr checks --watch` (max 2 min) then re-evaluate.

            ## STEP 3 — Quality Gate (10 checks per CLAUDE.md § "Quality Gate")

            Run each grep against the diff. Record file:line of any match. List the 10 checks in your sticky comment with ✅/❌.

            Also verify the PR body contains a `## Methodology` block listing at least 2 invoked superpowers skills (or `trivial-task` label is applied). If missing → ❌ Methodology violation.

            ## STEP 4 — Decide + execute

            ### A. Quality Gate 0/10 + Methodology block present + CI green → AUTO-MERGE
            ```bash
            gh pr comment ${{ needs.preflight.outputs.pr_number }} --body "✅ **Review passed** — Quality Gate 0/10, Methodology present, CI green. Auto-merging.

            **Summary**: <2-3 lines>
            **Methodology**: Opus 4.7 + superpowers:requesting-code-review"
            gh pr merge ${{ needs.preflight.outputs.pr_number }} --auto --squash --delete-branch
            ```

            ### B. AUTO-FIX MODE — for mechanical issues only:
            - ESLint/TypeScript errors with obvious fix
            - Missing imports
            - Outdated test snapshots
            - Typos/formatting
            - Missing Methodology block in PR body (just edit the body, don't re-run builder)

            Process:
            1. Apply `superpowers:systematic-debugging` to identify root cause
            2. Edit/Write the fix
            3. Run `bun test` and `bun run lint` locally if feasible
            4. Stage + commit with message starting "🔧 Autofix: <what>"
            5. Apply label `autofix-iter-<N>` where N = ${{ needs.preflight.outputs.iter }} + 1
            6. `git push origin HEAD`
            7. Post sticky comment: "🔧 **Autofix iter N/3**: <what was fixed>. CI re-running."

            DO NOT use `gh pr review --request-changes` here — you're fixing, not requesting.

            ### C. ESCALATE TO @NOEMUCH (only if):
            - Architectural decision needed (two valid approaches)
            - Ambiguous requirements (use `superpowers:brainstorming` to ask)
            - Security design red flag you can't self-fix
            - 3+ iterations failed (already capped at preflight)

            ```bash
            gh pr edit ${{ needs.preflight.outputs.pr_number }} --add-label agent-blocked
            gh pr merge ${{ needs.preflight.outputs.pr_number }} --disable-auto 2>/dev/null || true
            gh pr comment ${{ needs.preflight.outputs.pr_number }} --body "🔴 **Escalation to @noemuch**: <why human judgment needed>. \`agent-blocked\` applied."
            ```

            ## STYLE

            - Concise. Senior voice.
            - Inline refs `path/to/file.ts:42`
            - Comments < 300 words
            - Lean toward AUTO-MERGE or AUTO-FIX. Escalate only if genuinely ambiguous/architectural.
            - You have full merge authority. No path restrictions. Trust your judgment.

            GO. Max 95 turns.
          claude_args: |
            --model claude-opus-4-7
            --max-turns 95
            --dangerously-skip-permissions

      - name: Detect quota error
        id: quota
        if: steps.primary.outcome == 'failure'
        run: |
          # Same heuristic as builder workflow.
          echo "is_quota=true" >> "$GITHUB_OUTPUT"
          echo "::notice title=Reviewer failover::Primary failed; attempting secondary."

      - name: Run reviewer (failover = Finary)
        if: steps.primary.outcome == 'failure' && steps.quota.outputs.is_quota == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.NOEMUCH_PAT }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_OAUTH_SECONDARY }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude-reviewer"
          track_progress: ${{ github.event_name == 'pull_request' }}
          use_sticky_comment: ${{ github.event_name == 'pull_request' }}
          display_report: true
          plugin_marketplaces: |
            https://github.com/anthropics/claude-plugins-official.git
          plugins: |
            superpowers@claude-plugins-official
          prompt: |
            [FAILOVER] Same reviewer role as primary prompt above.
            Iteration: ${{ needs.preflight.outputs.iter }}/3 for PR #${{ needs.preflight.outputs.pr_number }}.
            Re-execute STEP 0 → STEP 1 → STEP 1.5 (if DIRTY/BEHIND) → STEP 2 → STEP 3 → STEP 4 from the reviewer spec in CLAUDE.md.
            Conflict auto-resolution budget: 3 files / 3 hunks / 3 iter, else agent-blocked.
            GO. Max 75 turns.
          claude_args: |
            --model claude-opus-4-7
            --max-turns 75
            --dangerously-skip-permissions

      - name: Detect quota exhaustion + persist state (reviewer)
        if: failure() || steps.primary.outcome == 'failure'
        uses: actions/github-script@v7
        env:
          GH_TOKEN: ${{ secrets.NOEMUCH_PAT }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PR_NUM: ${{ needs.preflight.outputs.pr_number }}
        with:
          github-token: ${{ secrets.NOEMUCH_PAT }}
          script: |
            const { execSync } = require('child_process');
            let limitHit = null;
            try {
              const log = execSync(`gh run view ${process.env.RUN_ID} --repo ${context.repo.owner}/${context.repo.repo} --log 2>&1 | grep -iE "hit your limit|resets [0-9]+(am|pm|UTC|utc)" | head -5`, {
                encoding: 'utf8', env: { ...process.env, GH_TOKEN: process.env.GH_TOKEN }
              });
              const match = log.match(/hit your limit[^\n]*?resets\s+(\d{1,2}(?::\d{2})?(?:am|pm)?\s*(?:\(?UTC\)?)?)/i);
              if (match) limitHit = match[1];
              else if (/hit your limit/i.test(log)) limitHit = 'unknown';
            } catch (e) { core.warning(e.message); }

            if (!limitHit) return;

            let resetAt;
            if (limitHit === 'unknown') {
              resetAt = new Date(Date.now() + 2 * 3600 * 1000).toISOString();
            } else {
              const now = new Date();
              const m = limitHit.match(/(\d{1,2})(?::(\d{2}))?(am|pm)?/i);
              if (m) {
                let h = parseInt(m[1], 10);
                const mm = m[2] ? parseInt(m[2], 10) : 0;
                const ampm = (m[3] || '').toLowerCase();
                if (ampm === 'pm' && h < 12) h += 12;
                if (ampm === 'am' && h === 12) h = 0;
                const d = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate(), h, mm, 0));
                if (d.getTime() <= now.getTime()) d.setUTCDate(d.getUTCDate() + 1);
                resetAt = d.toISOString();
              } else {
                resetAt = new Date(Date.now() + 2 * 3600 * 1000).toISOString();
              }
            }

            const account = '${{ steps.primary.outcome }}' === 'failure' ? 'primary' : 'secondary';
            const accountKey = account === 'primary' ? 'primary_exhausted_until' : 'secondary_exhausted_until';

            let state;
            try {
              const { data } = await github.rest.repos.getContent({
                owner: context.repo.owner, repo: context.repo.repo,
                path: '.github/quota-state.json', ref: 'main'
              });
              state = JSON.parse(Buffer.from(data.content, 'base64').toString('utf8'));
            } catch (e) {
              state = { primary_exhausted_until: null, secondary_exhausted_until: null, last_check: null, history: [] };
            }

            state[accountKey] = resetAt;
            state.last_check = new Date().toISOString();
            state.history = state.history || [];
            state.history.push({
              account, detected_at: new Date().toISOString(), reset_at: resetAt,
              run_url: process.env.RUN_URL,
              pr: parseInt(process.env.PR_NUM, 10) || null
            });
            if (state.history.length > 100) state.history = state.history.slice(-100);

            try {
              const { data: current } = await github.rest.repos.getContent({
                owner: context.repo.owner, repo: context.repo.repo,
                path: '.github/quota-state.json', ref: 'main'
              });
              await github.rest.repos.createOrUpdateFileContents({
                owner: context.repo.owner, repo: context.repo.repo,
                path: '.github/quota-state.json',
                message: `chore(quota): reviewer marked ${account} exhausted until ${resetAt}`,
                content: Buffer.from(JSON.stringify(state, null, 2) + '\n').toString('base64'),
                sha: current.sha,
                branch: 'main',
                committer: { name: 'Noé Chagué', email: 'noe@finary.com' },
                author: { name: 'Noé Chagué', email: 'noe@finary.com' }
              });
            } catch (e) { core.warning(e.message); }

            if (process.env.PR_NUM) {
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: parseInt(process.env.PR_NUM, 10),
                  labels: ['quota-paused']
                });
              } catch (e) { core.warning(e.message); }
            }

      - name: Compute + post run cost comment
        if: always()
        uses: actions/github-script@v7
        env:
          GH_TOKEN: ${{ secrets.NOEMUCH_PAT }}
          MODEL: claude-opus-4-7
          PR_NUM: ${{ needs.preflight.outputs.pr_number }}
        with:
          github-token: ${{ secrets.NOEMUCH_PAT }}
          script: |
            const { execSync } = require('child_process');

            const PRICES = {
              'claude-opus-4-7':    { input: 15.00, output: 75.00, cache_read: 1.50,  cache_write: 18.75 },
              'claude-sonnet-4-6':  { input:  3.00, output: 15.00, cache_read: 0.30,  cache_write:  3.75 },
              'claude-haiku-4-5':   { input:  1.00, output:  5.00, cache_read: 0.10,  cache_write:  1.25 },
            };
            const model = process.env.MODEL || 'claude-opus-4-7';
            const price = PRICES[model] || PRICES['claude-opus-4-7'];

            let log;
            try {
              log = execSync(`gh run view ${context.runId} --repo ${context.repo.owner}/${context.repo.repo} --log 2>&1`, {
                encoding: 'utf8',
                env: { ...process.env, GH_TOKEN: process.env.GH_TOKEN },
                maxBuffer: 50 * 1024 * 1024
              });
            } catch (e) {
              core.info(`Could not fetch run log: ${e.message}`);
              return;
            }

            const sumAll = (re) => {
              let total = 0;
              for (const m of log.matchAll(re)) total += parseInt(m[1], 10) || 0;
              return total;
            };

            const inputTokens = sumAll(/(?:^|\s)input_tokens["':\s=]+(\d+)/g);
            const outputTokens = sumAll(/(?:^|\s)output_tokens["':\s=]+(\d+)/g);
            const cacheReadTokens = sumAll(/(?:cache_read_input_tokens|cache_read_tokens)["':\s=]+(\d+)/g);
            const cacheCreateTokens = sumAll(/(?:cache_creation_input_tokens|cache_write_tokens)["':\s=]+(\d+)/g);

            if (inputTokens + outputTokens + cacheReadTokens + cacheCreateTokens === 0) {
              core.info('No token usage found in logs; skipping cost comment.');
              return;
            }

            const cost = (inputTokens * price.input
                        + outputTokens * price.output
                        + cacheReadTokens * price.cache_read
                        + cacheCreateTokens * price.cache_write) / 1e6;

            const cacheHitPct = (cacheReadTokens + inputTokens) > 0
              ? Math.round(100 * cacheReadTokens / (cacheReadTokens + inputTokens))
              : 0;

            const fmt = (n) => n >= 1e6 ? `${(n/1e6).toFixed(1)}M`
                             : n >= 1e3 ? `${(n/1e3).toFixed(1)}k` : String(n);

            const shortModel = model.replace(/^claude-/, '');
            const body = `💰 **Reviewer cost**: $${cost.toFixed(3)} — in: ${fmt(inputTokens)} / out: ${fmt(outputTokens)} / cache_read: ${fmt(cacheReadTokens)} (${cacheHitPct}%) / cache_write: ${fmt(cacheCreateTokens)} — model: \`${shortModel}\``;

            const pr = parseInt(process.env.PR_NUM, 10);
            if (!pr) return;
            try {
              await github.rest.issues.createComment({
                ...context.repo, issue_number: pr, body
              });
            } catch (e) {
              core.warning(`Cost comment post failed: ${e.message}`);
            }

      - name: Post review summary to automation log (#257)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.NOEMUCH_PAT }}
        run: |
          set -euo pipefail
          PR="${{ needs.preflight.outputs.pr_number }}"
          ITER="${{ needs.preflight.outputs.iter }}"
          OUTCOME="${{ steps.primary.outcome }}"
          gh issue comment 257 --repo noemuch/hive --body "🔍 **Reviewer run** for PR #${PR} — iter \`${ITER}/3\` — primary: \`${OUTCOME}\` — failover: \`${{ steps.quota.outputs.is_quota || 'no' }}\` — event: \`${{ github.event_name }}\` — [run](https://github.com/noemuch/hive/actions/runs/${{ github.run_id }})" || true
