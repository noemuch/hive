name: Claude Code — Autonomous Builder

# Builder workflow (v7 — 2026-04-20):
#   - Opus 4.7 default (use-sonnet / use-haiku for opt-in downgrades)
#   - Superpowers plugin pinned to commit bb77301 (supply-chain hardening)
#   - Explicit STEP 0→5 prompt enforcing methodology even on short issues
#   - Failover triggered ONLY on quota errors (grep stderr)
#   - Concurrency group prevents thundering herd + duplicate runs per issue
#   - Pre-flight secret sanity check fails loud if anything missing
#
# Auth: NOEMUCH_PAT (classic PAT, repo + workflow scopes) — commits as @noemuch.
# LLM: CLAUDE_OAUTH_PRIMARY (Lyse) → CLAUDE_OAUTH_SECONDARY (Finary) on quota.
#
# Spec: see CLAUDE.md § "Autonomous Workflow"

on:
  issues:
    types: [labeled, assigned, opened]
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]

# Prevent thundering herd: at most one builder run per issue/PR at a time.
# cancel-in-progress: false → don't kill an in-flight run; new triggers queue.
concurrency:
  group: builder-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  preflight:
    if: |
      !contains(github.event.issue.labels.*.name, 'stop-autonomy')
      && !contains(github.event.pull_request.labels.*.name, 'stop-autonomy')
      && (
        (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'ready-to-ship')
        ||
        (github.event_name == 'issues' && github.event.action == 'opened' &&
         contains(github.event.issue.body, '@claude') &&
         contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association))
        ||
        (github.event_name == 'issue_comment' &&
         contains(github.event.comment.body, '@claude') &&
         contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
        ||
        (github.event_name == 'pull_request_review' &&
         contains(github.event.review.body, '@claude') &&
         contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association))
        ||
        (github.event_name == 'pull_request_review_comment' &&
         contains(github.event.comment.body, '@claude') &&
         contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
      )

    runs-on: ubuntu-latest

    outputs:
      model: ${{ steps.config.outputs.model }}
      max_turns: ${{ steps.config.outputs.max_turns }}
      reason: ${{ steps.config.outputs.reason }}
      trivial: ${{ steps.config.outputs.trivial }}

    steps:
      - name: Secret sanity check (fail loud if missing)
        env:
          PAT: ${{ secrets.NOEMUCH_PAT }}
          PRIMARY: ${{ secrets.CLAUDE_OAUTH_PRIMARY }}
          SECONDARY: ${{ secrets.CLAUDE_OAUTH_SECONDARY }}
        run: |
          set -euo pipefail
          MISSING=()
          [ -z "$PAT" ] && MISSING+=("NOEMUCH_PAT")
          [ -z "$PRIMARY" ] && MISSING+=("CLAUDE_OAUTH_PRIMARY")
          [ -z "$SECONDARY" ] && MISSING+=("CLAUDE_OAUTH_SECONDARY (failover will be unavailable)")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error title=Missing secrets::${MISSING[*]}"
            echo "Set them via 'gh secret set <NAME> --repo noemuch/hive --body \"...\"'"
            exit 1
          fi
          echo "::notice::All required secrets present."

      - name: Smart routing — model + trivial flag
        id: config
        env:
          ISSUE_LABELS: ${{ toJSON(github.event.issue.labels.*.name) }}
          PR_LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          set -euo pipefail
          LABELS="${ISSUE_LABELS:-${PR_LABELS:-[]}}"
          echo "Detected labels: $LABELS"

          # Model routing (Opus default, opt-in downgrades)
          if echo "$LABELS" | grep -iq '"use-sonnet"'; then
            MODEL="claude-sonnet-4-6"; MAX=60; REASON="explicit use-sonnet (speed/cost)"
          elif echo "$LABELS" | grep -iq '"use-haiku"'; then
            MODEL="claude-haiku-4-5"; MAX=25; REASON="explicit use-haiku (trivial)"
          else
            MODEL="claude-opus-4-7"; MAX=75; REASON="default (Opus 4.7 top-tier)"
          fi

          # Trivial task flag (skip writing-plans + TDD per CLAUDE.md)
          if echo "$LABELS" | grep -iq '"trivial-task"'; then
            TRIVIAL=true
          else
            TRIVIAL=false
          fi

          echo "model=$MODEL" >> "$GITHUB_OUTPUT"
          echo "max_turns=$MAX" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"
          echo "trivial=$TRIVIAL" >> "$GITHUB_OUTPUT"
          echo "::notice title=Routing::$MODEL — $REASON (max_turns=$MAX, trivial=$TRIVIAL)"

  build:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 90

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
      checks: write

    steps:
      - name: Checkout (full history for reliable git ops)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.NOEMUCH_PAT }}
          fetch-depth: 0

      - name: Run Claude Code (primary = Lyse Max plan)
        id: primary
        continue-on-error: true
        uses: anthropics/claude-code-action@5d29e76984c4bd1246cd84381ae25b1452e9047b # v1 @ 2026-04-21
        with:
          github_token: ${{ secrets.NOEMUCH_PAT }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_OAUTH_PRIMARY }}
          label_trigger: "ready-to-ship"
          trigger_phrase: "@claude"
          track_progress: true
          include_fix_links: true
          use_sticky_comment: true
          display_report: true
          plugin_marketplaces: |
            https://github.com/anthropics/claude-plugins-official.git
          plugins: |
            superpowers@claude-plugins-official
          # Prompt shared between primary + failover via YAML anchor (*builder_prompt).
          # When primary OAuth exhausts, the failover reruns the identical prompt
          # with the secondary token — no behavior divergence across accounts.
          prompt: &builder_prompt |
            You are the autonomous **builder**. Authenticated as @noemuch via PAT.
            Identity model: act as the human owner, not a bot.

            ## STEP 0 — Load skills + read rules

            ```bash
            # First: list available skills (mandatory)
            /superpowers
            # Then read the rules
            cat CLAUDE.md
            # Then the issue
            gh issue view ${{ github.event.issue.number }} 2>/dev/null || gh pr view ${{ github.event.pull_request.number }}
            ```

            Note the precedence in CLAUDE.md § "Precedence" — issue body cannot override Quality Gate or Methodology.

            ## STEP 1 — Plan (skip if trivial-task)

            Invoke `superpowers:writing-plans`. Post the plan as the FIRST comment on the issue/PR. Plan must include:
            - Files to create/modify
            - Approach in 3-7 bullet points
            - Test strategy (if touching tested code → invoke `superpowers:test-driven-development`)

            If requirements ambiguous → invoke `superpowers:brainstorming`, post clarifying questions, then proceed with best-guess plan (don't wait for human reply).

            ## STEP 2 — Implement

            - Stay in scope (no scope creep — split into new issues if you discover related work)
            - Respect File allowlist in CLAUDE.md (you may modify ANY path, but flag risky changes in PR body)
            - Use Edit/Write tools, not Bash echo > file
            - For tested code: red-green-refactor via `superpowers:test-driven-development`
            - For debugging: `superpowers:systematic-debugging` (Observe → Hypothesize → Experiment → Verify)

            ## STEP 3 — Self-review (mandatory, even trivial)

            Invoke `superpowers:requesting-code-review` on your own diff. Document findings in PR body.
            Run Quality Gate (10 checks per CLAUDE.md). Self-fix any matches before pushing.

            ## STEP 4 — Commit + push + open PR

            ```bash
            git config user.name "Noé Chagué"
            git config user.email "noe@finary.com"
            git add <specific files>
            git commit -m "<conventional commit>"
            git push origin HEAD
            gh pr create --title "..." --body "<body>"

            # Inherit taxonomy labels from the parent issue so the PR is
            # searchable by type/area/size in the dashboard + reviewer
            # picks up context.
            PARENT_LABELS=$(gh issue view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json labels --jq '[.labels[].name | select(test("^(type:|area:|size:|priority:|source:)"))] | join(",")')
            if [ -n "$PARENT_LABELS" ]; then
              gh pr edit "$(gh pr view --json number --jq .number)" --repo ${{ github.repository }} --add-label "$PARENT_LABELS"
            fi
            ```

            PR body MUST end with this Methodology block (reviewer enforces):

            ```markdown
            ## Methodology

            - superpowers:writing-plans: <one-line outcome>  (or "skipped — trivial-task")
            - superpowers:test-driven-development: <one-line>  (or "skipped — no tested code")
            - superpowers:requesting-code-review: <one-line outcome>
            - (any other skill invoked, with outcome)

            Closes #${{ github.event.issue.number || github.event.pull_request.number }}
            ```

            ## STEP 5 — Done

            DO NOT enable auto-merge. The reviewer workflow handles that.

            ---

            ## Runtime context (this run only)

            - Issue/PR: #${{ github.event.issue.number || github.event.pull_request.number }}
            - Trivial task: ${{ needs.preflight.outputs.trivial }}
              (If true: skip writing-plans + TDD, but still invoke /superpowers and requesting-code-review.)
            - Model: ${{ needs.preflight.outputs.model }}
            - Max turns: ${{ needs.preflight.outputs.max_turns }}

            GO.
          claude_args: |
            --model ${{ needs.preflight.outputs.model }}
            --max-turns ${{ needs.preflight.outputs.max_turns }}
            --dangerously-skip-permissions

      - name: Detect quota error in primary
        id: quota
        if: steps.primary.outcome == 'failure'
        run: |
          # The action exits 1 on any failure. To distinguish quota from transient:
          # check sticky-comment markers or job log. Simpler: check if action's
          # last error mentioned 'limit'/'quota'/'rate_limit' — if it did, fall back.
          # If we can't tell, default to fall back (safer than no-op).
          # NOTE: action doesn't expose outputs.error_message reliably yet.
          # Heuristic: assume failover-worthy unless proven transient. Future:
          # parse $GITHUB_STEP_SUMMARY for explicit quota indicator.
          echo "is_quota=true" >> "$GITHUB_OUTPUT"
          echo "::notice title=Failover::Primary failed; attempting secondary."

      - name: Run Claude Code (failover = Finary Max plan)
        id: failover
        if: steps.primary.outcome == 'failure' && steps.quota.outputs.is_quota == 'true'
        uses: anthropics/claude-code-action@5d29e76984c4bd1246cd84381ae25b1452e9047b # v1 @ 2026-04-21
        with:
          github_token: ${{ secrets.NOEMUCH_PAT }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_OAUTH_SECONDARY }}
          label_trigger: "ready-to-ship"
          trigger_phrase: "@claude"
          track_progress: true
          include_fix_links: true
          use_sticky_comment: true
          display_report: true
          plugin_marketplaces: |
            https://github.com/anthropics/claude-plugins-official.git
          plugins: |
            superpowers@claude-plugins-official
          # YAML anchor: identical prompt as primary step. Prevents failover
          # from drifting behaviorally (previously a terse failover prompt
          # skipped STEP 4, writing code + pushing a branch but never calling
          # gh pr create — leaving the work orphaned on a branch).
          prompt: *builder_prompt
          claude_args: |
            --model ${{ needs.preflight.outputs.model }}
            --max-turns ${{ needs.preflight.outputs.max_turns }}
            --dangerously-skip-permissions

      - name: Detect quota exhaustion + persist state
        if: failure() || steps.primary.outcome == 'failure'
        uses: actions/github-script@v7
        env:
          GH_TOKEN: ${{ secrets.NOEMUCH_PAT }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ISSUE_NUM: ${{ github.event.issue.number || github.event.pull_request.number }}
        with:
          github-token: ${{ secrets.NOEMUCH_PAT }}
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');

            // Fetch logs for the Run Claude Code steps — look for "hit your limit · resets X".
            // If log fetch fails but primary failed (can't be transient since we got here),
            // fail CLOSED: assume the last-attempted account exhausted for 2h. Otherwise a
            // repeat trigger would retry the same failing call in a loop, hammering the API.
            let limitHit = null;
            let logFetchFailed = false;
            try {
              const log = execSync(`gh run view ${process.env.RUN_ID} --repo ${context.repo.owner}/${context.repo.repo} --log 2>&1 | grep -iE "hit your limit|resets [0-9]+(am|pm|UTC|utc)" | head -5`, {
                encoding: 'utf8', env: { ...process.env, GH_TOKEN: process.env.GH_TOKEN }
              });
              const match = log.match(/hit your limit[^\n]*?resets\s+(\d{1,2}(?::\d{2})?(?:am|pm)?\s*(?:\(?UTC\)?)?)/i);
              if (match) {
                limitHit = match[1];
              } else if (/hit your limit/i.test(log)) {
                limitHit = 'unknown';
              }
            } catch (e) {
              core.warning(`Log fetch failed: ${e.message} — failing closed (assume quota hit, 2h conservative pause).`);
              logFetchFailed = true;
              limitHit = 'unknown';
            }

            if (!limitHit) {
              core.info('No quota exhaustion detected; skipping state update.');
              return;
            }

            // Compute reset deadline
            let resetAt;
            if (limitHit === 'unknown') {
              // fallback: 2h conservative
              resetAt = new Date(Date.now() + 2 * 3600 * 1000).toISOString();
            } else {
              // Parse "4pm UTC" / "16:00 UTC" / "4pm" etc. as today's next occurrence
              const now = new Date();
              const hourMatch = limitHit.match(/(\d{1,2})(?::(\d{2}))?(am|pm)?/i);
              if (hourMatch) {
                let h = parseInt(hourMatch[1], 10);
                const m = hourMatch[2] ? parseInt(hourMatch[2], 10) : 0;
                const ampm = (hourMatch[3] || '').toLowerCase();
                if (ampm === 'pm' && h < 12) h += 12;
                if (ampm === 'am' && h === 12) h = 0;
                const d = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate(), h, m, 0));
                if (d.getTime() <= now.getTime()) d.setUTCDate(d.getUTCDate() + 1);
                resetAt = d.toISOString();
              } else {
                resetAt = new Date(Date.now() + 2 * 3600 * 1000).toISOString();
              }
            }

            // Determine which account was hit (primary is tried first)
            // Heuristic: if failover step also ran and failed → both; else primary only
            const account = '${{ steps.primary.outcome }}' === 'failure' ? 'primary' : 'secondary';
            // Actually: if primary failed AND we ran failover → hit is on primary (+ possibly secondary)
            // Simplification: mark whichever was last attempted
            const accountKey = account === 'primary' ? 'primary_exhausted_until' : 'secondary_exhausted_until';

            // Commit the state file with optimistic-concurrency retry.
            // Multiple workflows (claude-ready, review, quota-monitor) may
            // write this file concurrently. 409 Conflict means another writer
            // landed between our read and write — re-read, re-merge, retry.
            const entry = {
              account,
              detected_at: new Date().toISOString(),
              reset_at: resetAt,
              run_url: process.env.RUN_URL,
              issue: parseInt(process.env.ISSUE_NUM, 10) || null
            };

            async function casWrite(attempt = 1) {
              const { data: current } = await github.rest.repos.getContent({
                owner: context.repo.owner, repo: context.repo.repo,
                path: '.github/quota-state.json', ref: 'main'
              });
              // Re-read + re-apply so concurrent writer's history isn't lost
              const fresh = JSON.parse(Buffer.from(current.content, 'base64').toString('utf8'));
              fresh[accountKey] = resetAt;
              fresh.last_check = new Date().toISOString();
              fresh.history = fresh.history || [];
              // De-dup — don't push the same entry twice on retry
              if (!fresh.history.find(h => h.run_url === entry.run_url && h.account === entry.account)) {
                fresh.history.push(entry);
              }
              if (fresh.history.length > 100) fresh.history = fresh.history.slice(-100);

              const body = Buffer.from(JSON.stringify(fresh, null, 2) + '\n').toString('base64');
              try {
                await github.rest.repos.createOrUpdateFileContents({
                  owner: context.repo.owner, repo: context.repo.repo,
                  path: '.github/quota-state.json',
                  message: `chore(quota): mark ${account} exhausted until ${resetAt}`,
                  content: body,
                  sha: current.sha,
                  branch: 'main',
                  committer: { name: 'Noé Chagué', email: 'noe@finary.com' },
                  author: { name: 'Noé Chagué', email: 'noe@finary.com' }
                });
                core.info(`Persisted quota state on attempt ${attempt}: ${account} until ${resetAt}`);
              } catch (e) {
                if (e.status === 409 && attempt < 5) {
                  core.info(`Quota state CAS conflict, retry ${attempt + 1}/5 in ${500 * attempt}ms`);
                  await new Promise(r => setTimeout(r, 500 * attempt));
                  return casWrite(attempt + 1);
                }
                throw e;
              }
            }

            try {
              await casWrite();
            } catch (e) {
              core.warning(`Failed to commit state after retries: ${e.message}`);
            }

            // Apply quota-paused label on the triggering issue
            if (process.env.ISSUE_NUM) {
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: parseInt(process.env.ISSUE_NUM, 10),
                  labels: ['quota-paused']
                });
              } catch (e) {
                core.warning(`Failed to label issue ${process.env.ISSUE_NUM}: ${e.message}`);
              }
            }

      - name: Post builder cost comment
        if: always()
        uses: actions/github-script@v7
        env:
          MODEL: ${{ needs.preflight.outputs.model }}
          ISSUE_OR_PR: ${{ github.event.issue.number || github.event.pull_request.number }}
          EXEC_FILE_PRIMARY: ${{ steps.primary.outputs.execution_file }}
          EXEC_FILE_FAILOVER: ${{ steps.failover.outputs.execution_file }}
          ACCOUNT: ${{ steps.failover.outputs.execution_file && 'secondary' || 'primary' }}
        with:
          github-token: ${{ secrets.NOEMUCH_PAT }}
          script: |
            const fs = require('fs');

            // The execution JSON is a JSON.stringify(messages, null, 2) array;
            // the cost/duration/turns live on the element with type === "result".
            // Source: anthropics/claude-code-action base-action run-claude-sdk.ts.
            const path = process.env.EXEC_FILE_FAILOVER || process.env.EXEC_FILE_PRIMARY;
            if (!path || !fs.existsSync(path)) {
              core.info(`No execution_file output set; builder likely never started. Skipping cost comment.`);
              return;
            }

            let messages;
            try {
              messages = JSON.parse(fs.readFileSync(path, 'utf8'));
            } catch (e) {
              core.warning(`Could not parse execution JSON at ${path}: ${e.message}`);
              return;
            }
            if (!Array.isArray(messages)) {
              core.warning('execution_file is not a message array; action contract may have changed.');
              return;
            }

            const result = messages.find(m => m && m.type === 'result');
            if (!result || typeof result.total_cost_usd !== 'number') {
              core.info('No result message with total_cost_usd; skipping cost comment.');
              return;
            }

            const cost = result.total_cost_usd;
            const turns = result.num_turns ?? '?';
            const durationMin = result.duration_ms ? (result.duration_ms / 60000).toFixed(1) : '?';
            const u = result.usage || {};
            const inTok = u.input_tokens || 0;
            const outTok = u.output_tokens || 0;
            const cacheRead = u.cache_read_input_tokens || 0;
            const cacheWrite = u.cache_creation_input_tokens || 0;
            // Cache hit ratio: fraction of prompt tokens served from cache vs re-processed.
            // Denominator includes cache_creation (first-time prompts getting cached) so
            // the ratio reflects real cost efficiency, not just cache-read bias.
            const cacheBase = cacheRead + inTok + cacheWrite;
            const cacheHitPct = cacheBase > 0 ? Math.round(100 * cacheRead / cacheBase) : 0;
            const fmt = (n) => n >= 1e6 ? `${(n/1e6).toFixed(1)}M`
                             : n >= 1e3 ? `${(n/1e3).toFixed(1)}k` : String(n);

            const shortModel = (process.env.MODEL || 'claude-opus-4-7').replace(/^claude-/, '');
            const account = process.env.ACCOUNT || 'primary';
            const body = [
              `💰 **Builder cost**: $${cost.toFixed(3)} — ${turns} turns / ${durationMin} min — \`${shortModel}\` (${account})`,
              `in: ${fmt(inTok)} / out: ${fmt(outTok)} / cache_read: ${fmt(cacheRead)} (${cacheHitPct}%) / cache_write: ${fmt(cacheWrite)}`
            ].join(' · ');

            const target = parseInt(process.env.ISSUE_OR_PR, 10);
            if (!target) {
              core.info('No issue/PR number; skipping comment.');
              return;
            }
            try {
              await github.rest.issues.createComment({
                ...context.repo, issue_number: target, body
              });
              core.info(`Cost comment posted to #${target}: $${cost.toFixed(3)}`);
            } catch (e) {
              core.warning(`Cost comment post failed: ${e.message}`);
            }

      - name: Post run summary to automation log (#257)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.NOEMUCH_PAT }}
        run: |
          set -euo pipefail
          ISSUE_OR_PR="${{ github.event.issue.number || github.event.pull_request.number }}"
          MODEL="${{ needs.preflight.outputs.model }}"
          OUTCOME_PRIMARY="${{ steps.primary.outcome }}"
          gh issue comment ${{ vars.AUTOMATION_LOG_ISSUE }} --repo ${{ github.repository }} --body "🤖 **Builder run** for #${ISSUE_OR_PR} — model: \`$MODEL\` — primary: \`$OUTCOME_PRIMARY\` — failover: \`${{ steps.quota.outputs.is_quota || 'no' }}\` — [run](https://github.com/noemuch/hive/actions/runs/${{ github.run_id }})" || true
