name: Dispatch Ready — Dep-aware orchestrator

# Computes which agent-ready issues have all their dependencies satisfied
# (merged PRs + closed sub-issues) and applies the `ready-to-ship` label,
# which triggers the builder workflow.
#
# Dependencies parsed from 3 sources (OR):
#   1. Sub-issues (GitHub native) — parent waits for all children closed
#   2. Issue body `Depends on: #N[, #M]` / `Blocked by: #N`
#   3. Issue body `Fixes #N` on linked PRs (transitive closure signal)
#
# Triggers:
#   - Scheduled cron (15 min) — catches any drift
#   - issues.closed / issues.reopened — re-evaluate after state change
#   - pull_request.closed — re-evaluate after merge unblocks deps
#   - issues.labeled — new agent-ready issue → evaluate immediately
#   - workflow_dispatch — manual re-run
#
# Outputs:
#   - Applies/removes `ready-to-ship` label based on dep state
#   - Applies/removes `waiting-deps` label for visibility (inverse)
#   - Comments `🔀 Blocked by: #X, #Y` on transitions to waiting-deps
#   - Posts summary to issue #257 on every run
#
# Kill-switch: label `stop-autonomy` excludes an issue from dispatch.

on:
  schedule:
    - cron: '*/15 * * * *'  # every 15 minutes
  issues:
    types: [closed, reopened, labeled, unlabeled]
  pull_request:
    types: [closed]
  workflow_dispatch:

concurrency:
  group: dispatch-ready
  cancel-in-progress: false

jobs:
  compute-ready:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
      contents: read

    steps:
      - name: Compute ready set (dep-aware)
        uses: actions/github-script@v7
        env:
          GH_TOKEN: ${{ secrets.NOEMUCH_PAT }}
        with:
          github-token: ${{ secrets.NOEMUCH_PAT }}
          script: |
            const q = `
              query($o:String!, $r:String!, $c:String) {
                repository(owner:$o, name:$r) {
                  issues(first:100, states:OPEN, after:$c) {
                    pageInfo { hasNextPage endCursor }
                    nodes {
                      number title body
                      labels(first:30) { nodes { name } }
                      subIssues(first:50) { nodes { number state } }
                      parent {
                        number
                        state
                        labels(first:20) { nodes { name } }
                      }
                    }
                  }
                }
              }
            `;

            // Paginate all open issues. Cap at 10 pages (1000 issues) — if a repo
            // ever exceeds that, warn loudly so we raise the cap before tail
            // issues silently stop being triaged.
            const MAX_PAGES = 10;
            const issues = [];
            let cursor = null;
            let pagedOut = false;
            for (let i = 0; i < MAX_PAGES; i++) {
              const res = await github.graphql(q, {
                o: context.repo.owner,
                r: context.repo.repo,
                c: cursor
              });
              issues.push(...res.repository.issues.nodes);
              if (!res.repository.issues.pageInfo.hasNextPage) break;
              cursor = res.repository.issues.pageInfo.endCursor;
              if (i === MAX_PAGES - 1 && res.repository.issues.pageInfo.hasNextPage) {
                pagedOut = true;
              }
            }
            if (pagedOut) {
              core.warning(`Pagination cap reached at ${MAX_PAGES} pages (${issues.length} issues). Additional open issues beyond this point are NOT evaluated by dispatch-ready until the cap is raised.`);
            }

            core.info(`Fetched ${issues.length} open issues`);

            const byNum = new Map(issues.map(i => [i.number, i]));
            // Tolerate markdown bold, italic, and various whitespace before the label
            const depRe = /(?:^|\n)[\s>*_-]*(?:\*\*|__)?\s*(?:depends on|blocked by)(?:\*\*|__)?[:\s]+((?:#\d+(?:\s*,\s*)?)+)/gim;

            function extractRefDeps(body) {
              const refs = new Set();
              const text = body || '';
              for (const match of text.matchAll(depRe)) {
                const nums = match[1].matchAll(/#(\d+)/g);
                for (const n of nums) refs.add(+n[1]);
              }
              return [...refs];
            }

            function hasLabel(issue, name) {
              return issue.labels.nodes.some(l => l.name === name);
            }

            async function isBlockerOpen(n) {
              // Check if issue/PR #n is still open (blocker unresolved)
              // Could be issue OR PR — both share number space.
              try {
                const { data } = await github.rest.issues.get({
                  ...context.repo, issue_number: n
                });
                return data.state === 'open';
              } catch (e) {
                // 404 = not found → truly deleted/doesn't exist → not a blocker.
                // 5xx / rate-limit / network → transient → treat as blocker to
                // prevent flipping an issue to ready-to-ship based on a
                // misleading "deleted blocker" signal from a GitHub glitch.
                if (e.status === 404) return false;
                core.warning(`isBlockerOpen(#${n}) transient error ${e.status || '?'}: ${e.message}; treating as still-blocking to fail closed.`);
                return true;
              }
            }

            const ready = [];
            const waiting = [];
            const summary = [];

            // Throttle: max N open claude/* PRs at once to prevent thundering
            // herd of mutual conflicts. Raise once auto-rebase proves itself.
            const MAX_PARALLEL_PRS = 5;
            const openPrs = await github.paginate(github.rest.pulls.list, {
              ...context.repo, state: 'open', per_page: 100
            });
            const activeClaudePrs = openPrs.filter(p =>
              p.user && p.user.login === 'noemuch' &&
              p.head && p.head.ref && p.head.ref.startsWith('claude/')
            ).length;
            let availableSlots = Math.max(0, MAX_PARALLEL_PRS - activeClaudePrs);
            core.info(`Throttle: ${activeClaudePrs}/${MAX_PARALLEL_PRS} active claude PRs. ${availableSlots} slots available.`);

            // Collect unblocked candidates first (deterministic FIFO by issue.number)
            const unblockedCandidates = [];
            const blockedEntries = [];

            function parentBlocked(issue) {
              // Gap K — parent stop-autonomy cascade.
              // If the native-sub-issue parent is labeled stop-autonomy or
              // agent-blocked, the child inherits that intent even without its
              // own label. Prevents "kill the initiative but 4 children still
              // building" (observed design flaw on 2026-04-21 audit).
              if (!issue.parent || issue.parent.state !== 'OPEN') return null;
              const plabels = (issue.parent.labels?.nodes || []).map(l => l.name);
              if (plabels.includes('stop-autonomy')) return 'stop-autonomy';
              if (plabels.includes('agent-blocked')) return 'agent-blocked';
              return null;
            }

            for (const issue of issues) {
              // Skip kill-switched
              if (hasLabel(issue, 'stop-autonomy')) continue;
              // Skip issues that aren't opted-in for automation
              if (!hasLabel(issue, 'agent-ready')) continue;
              // Skip epics
              if (hasLabel(issue, 'epic')) continue;
              // Skip if parent initiative has stop-autonomy or agent-blocked (Gap K)
              const parentSignal = parentBlocked(issue);
              if (parentSignal) {
                core.info(`Skip #${issue.number}: parent #${issue.parent.number} has ${parentSignal} label (cascade)`);
                continue;
              }
              // Skip if agent-blocked (already escalated)
              if (hasLabel(issue, 'agent-blocked')) continue;

              // Gather blockers
              const bodyDeps = extractRefDeps(issue.body);
              const subIssueBlockers = issue.subIssues.nodes
                .filter(s => s.state === 'OPEN')
                .map(s => s.number);
              const allBlockers = [...new Set([...bodyDeps, ...subIssueBlockers])];

              // Filter to still-open blockers
              const stillOpen = [];
              for (const b of allBlockers) {
                if (await isBlockerOpen(b)) stillOpen.push(b);
              }

              const hasReady = hasLabel(issue, 'ready-to-ship');
              const hasWaiting = hasLabel(issue, 'waiting-deps');

              if (stillOpen.length === 0) {
                unblockedCandidates.push({ number: issue.number, hasReady, hasWaiting });
              } else {
                blockedEntries.push({ number: issue.number, hasReady, hasWaiting, stillOpen });
              }
            }

            // Sort unblocked by number ASC (FIFO) for deterministic throttle selection
            unblockedCandidates.sort((a, b) => a.number - b.number);

            const throttled = [];
            for (const c of unblockedCandidates) {
              if (availableSlots > 0) {
                // Promote to ready-to-ship
                if (!c.hasReady) {
                  await github.rest.issues.addLabels({
                    ...context.repo, issue_number: c.number,
                    labels: ['ready-to-ship']
                  });
                  ready.push(`#${c.number}`);
                }
                if (c.hasWaiting) {
                  await github.rest.issues.removeLabel({
                    ...context.repo, issue_number: c.number,
                    name: 'waiting-deps'
                  });
                }
                availableSlots -= 1;
              } else {
                // Throttled: ensure ready-to-ship is NOT applied (wait next tick)
                if (c.hasReady) {
                  await github.rest.issues.removeLabel({
                    ...context.repo, issue_number: c.number,
                    name: 'ready-to-ship'
                  });
                }
                throttled.push(`#${c.number}`);
              }
            }

            // Apply blocked labels (unchanged logic)
            for (const b of blockedEntries) {
              if (!b.hasWaiting) {
                await github.rest.issues.addLabels({
                  ...context.repo, issue_number: b.number,
                  labels: ['waiting-deps']
                });
                waiting.push(`#${b.number} (by: ${b.stillOpen.map(n => '#' + n).join(', ')})`);
              }
              if (b.hasReady) {
                await github.rest.issues.removeLabel({
                  ...context.repo, issue_number: b.number,
                  name: 'ready-to-ship'
                });
              }
            }

            core.info(`Newly ready: ${ready.length ? ready.join(', ') : 'none'}`);
            core.info(`Newly waiting: ${waiting.length ? waiting.join(', ') : 'none'}`);

            // =================================================================
            // Self-healing sweep: retry stuck issues.
            //
            // "Stuck" = ready-to-ship applied > 20 min ago + NO open claude/*
            // PR for the issue. This happens when the builder fails mid-run
            // (prompt error, quota+failover both exhausted, etc.) and leaves
            // an orphan branch without a PR. Without this sweep, the issue
            // waits for a human to manually re-kick it.
            //
            // Mechanic: remove + re-add the `ready-to-ship` label to emit a
            // fresh `issues.labeled` event that re-fires the builder. A label
            // counter (`retry-1`, `retry-2`, `retry-3`) caps retries at 3;
            // beyond that → `agent-blocked` + escalate to @noemuch.
            // =================================================================
            const STUCK_THRESHOLD_MS = 20 * 60 * 1000;
            const MAX_RETRIES = 3;
            const nowMs = Date.now();
            const stuckRetried = [];
            const stuckEscalated = [];

            for (const issue of issues) {
              if (!hasLabel(issue, 'ready-to-ship')) continue;
              if (hasLabel(issue, 'stop-autonomy') || hasLabel(issue, 'agent-blocked')) continue;

              // Check for open PR with head claude/issue-<N>-*
              const prs = await github.paginate(github.rest.pulls.list, {
                ...context.repo,
                state: 'open',
                head: `${context.repo.owner}:claude/issue-${issue.number}`,
                per_page: 10
              }).catch(() => []);
              if (prs.length > 0) continue;

              // Also accept PRs whose head matches the pattern more loosely
              // (some builders use branch names without strict prefix).
              // The list.pulls head filter is exact; so also scan openPrs (already
              // fetched) for branches that START with claude/issue-<N>-
              const looserMatch = openPrs.find(p =>
                p.head && p.head.ref &&
                p.head.ref.startsWith(`claude/issue-${issue.number}-`)
              );
              if (looserMatch) continue;

              // When was ready-to-ship last applied?
              let lastAppliedMs = null;
              try {
                const events = await github.paginate(github.rest.issues.listEvents, {
                  ...context.repo, issue_number: issue.number, per_page: 100
                });
                const readyLabelEvents = events.filter(e =>
                  e.event === 'labeled' && e.label && e.label.name === 'ready-to-ship'
                );
                if (readyLabelEvents.length > 0) {
                  lastAppliedMs = new Date(readyLabelEvents[readyLabelEvents.length - 1].created_at).getTime();
                }
              } catch (e) {
                core.warning(`Could not fetch events for #${issue.number}: ${e.message}`);
                continue;
              }

              if (!lastAppliedMs || (nowMs - lastAppliedMs) < STUCK_THRESHOLD_MS) {
                continue; // fresh — give the builder more time
              }

              // Check for active builder runs on this issue before retrying (don't
              // double-fire if a build is still running after >20 min — e.g. a
              // size:L scope legitimately takes 25 min).
              const runs = await github.rest.actions.listWorkflowRunsForRepo({
                ...context.repo,
                per_page: 20,
                status: 'in_progress'
              }).then(r => r.data.workflow_runs).catch(() => []);
              const activeBuild = runs.find(r =>
                r.name && r.name.includes('Builder') &&
                r.display_title && r.display_title.includes(`#${issue.number}`) || (r.head_branch && r.head_branch.includes(`issue-${issue.number}`))
              );
              if (activeBuild) continue;

              // Count prior retries via retry-N labels
              const retryLabels = issue.labels.nodes
                .filter(l => /^retry-\d+$/.test(l.name))
                .map(l => parseInt(l.name.replace('retry-', ''), 10))
                .filter(n => !isNaN(n));
              const currentRetry = retryLabels.length > 0 ? Math.max(...retryLabels) : 0;

              if (currentRetry >= MAX_RETRIES) {
                // Escalate — builder has failed MAX_RETRIES times in a row
                await github.rest.issues.addLabels({
                  ...context.repo, issue_number: issue.number,
                  labels: ['agent-blocked']
                });
                try {
                  await github.rest.issues.removeLabel({
                    ...context.repo, issue_number: issue.number,
                    name: 'ready-to-ship'
                  });
                } catch (e) { /* already removed */ }
                await github.rest.issues.createComment({
                  ...context.repo, issue_number: issue.number,
                  body: `🔴 **Stuck after ${MAX_RETRIES} builder retries** — no PR produced across ${MAX_RETRIES} attempts. Likely root cause: both OAuth accounts exhausted, a systemic prompt failure, or a bug the builder can't self-recover from. \`agent-blocked\` applied; @noemuch please investigate via the run log history.`
                });
                stuckEscalated.push(`#${issue.number}`);
              } else {
                // Retry: re-fire a clean `labeled` event for ready-to-ship.
                //
                // IMPORTANT: add retry-N FIRST, wait, then remove + re-add
                // ready-to-ship LAST. Observed bug (2026-04-21 on #315):
                // adding ['ready-to-ship', 'retry-N'] in one call emits two
                // webhooks in quick succession; the builder that fires on
                // the ready-to-ship event gets cancelled by concurrency
                // handling of the retry-N event (even with
                // cancel-in-progress: false, queued runs can be cancelled
                // when new ones land in the same group within the webhook
                // propagation window).
                //
                // Sequencing ensures the final ready-to-ship labeled event
                // is the last one in the group, so the builder triggered
                // by it runs unopposed.
                try {
                  await github.rest.issues.addLabels({
                    ...context.repo, issue_number: issue.number,
                    labels: [`retry-${currentRetry + 1}`]
                  });
                } catch (e) { /* label may exist if replayed */ }

                await new Promise(r => setTimeout(r, 3000)); // let webhook drain

                try {
                  await github.rest.issues.removeLabel({
                    ...context.repo, issue_number: issue.number,
                    name: 'ready-to-ship'
                  });
                } catch (e) { /* already removed */ }

                await new Promise(r => setTimeout(r, 2000)); // let unlabeled webhook drain

                await github.rest.issues.addLabels({
                  ...context.repo, issue_number: issue.number,
                  labels: ['ready-to-ship']
                });
                stuckRetried.push(`#${issue.number} (retry ${currentRetry + 1}/${MAX_RETRIES})`);
              }
            }

            if (stuckRetried.length) core.info(`Stuck retries fired: ${stuckRetried.join(', ')}`);
            if (stuckEscalated.length) core.warning(`Stuck escalations (max retries): ${stuckEscalated.join(', ')}`);

            // Summary to automation log
            if (ready.length || waiting.length || throttled.length || stuckRetried.length || stuckEscalated.length) {
              const body = [
                `🔀 **Dispatch cron run** — [${new Date().toISOString()}]`,
                `Slots: ${activeClaudePrs}/${MAX_PARALLEL_PRS} active claude PRs`,
                ready.length ? `✅ Newly ready-to-ship: ${ready.join(', ')}` : null,
                waiting.length ? `⏸ Newly waiting-deps: ${waiting.join('; ')}` : null,
                throttled.length ? `🚦 Throttled (queued for next tick): ${throttled.join(', ')}` : null,
                stuckRetried.length ? `🔄 Stuck retried: ${stuckRetried.join(', ')}` : null,
                stuckEscalated.length ? `⛔ Stuck escalated (max retries): ${stuckEscalated.join(', ')}` : null,
                `[run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
              ].filter(Boolean).join('\n\n');

              await github.rest.issues.createComment({
                ...context.repo, issue_number: ${{ vars.AUTOMATION_LOG_ISSUE }}, body
              });
            }
