name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.9"

      - name: Install dependencies
        run: bun install

      - name: Server tests
        run: cd server && bun test

      - name: HEAR tests
        run: cd scripts/hear && bun test --timeout 30000

      - name: Lint (web)
        run: cd web && bun run lint
