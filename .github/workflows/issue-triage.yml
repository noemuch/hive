name: Issue Triage — auto-label new issues

# On issue opened: Sonnet 4.6 classifies type/area/size/model-hint and
# applies labels atomically. If size=XL, also applies `needs-split` so
# issue-splitter can decompose before the builder picks it up.
#
# Uses claude-code-action@v1 with a tight JSON-output prompt. Cost: ~$0.005/issue.
#
# Skip conditions:
#   - Issue has stop-autonomy / agent-blocked / no-triage (explicit opt-out)
#   - Issue has source:main-healer / source:retro / source:sentry (those workflows pre-label)
#   - Issue was created by @noemuch with a label already applied (assume intentional)

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue to re-triage
        required: true
        type: number

concurrency:
  group: issue-triage-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: false

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      issues: write

    steps:
      - name: Resolve issue + skip filter
        id: gate
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.NOEMUCH_PAT }}
          script: |
            const issueNumber = context.eventName === 'workflow_dispatch'
              ? parseInt(context.payload.inputs.issue_number, 10)
              : context.payload.issue.number;
            const { data: issue } = await github.rest.issues.get({
              ...context.repo, issue_number: issueNumber
            });
            const labels = (issue.labels || []).map(l => typeof l === 'string' ? l : l.name);
            const skipLabels = ['stop-autonomy', 'agent-blocked', 'no-triage',
                                'source:main-healer', 'source:retro', 'source:sentry',
                                'qa-digest'];
            const skip = skipLabels.some(l => labels.includes(l));
            if (skip) {
              core.notice(`Skipping triage for #${issueNumber} (has skip label)`);
              core.setOutput('skip', 'true');
              return;
            }
            core.setOutput('skip', 'false');
            core.setOutput('issue_number', String(issueNumber));
            core.setOutput('title', issue.title);
            core.setOutput('body', (issue.body || '').slice(0, 3000));

      - name: Checkout (for CLAUDE.md context)
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.NOEMUCH_PAT }}
          fetch-depth: 1

      - name: Classify + label via Sonnet 4.6
        if: steps.gate.outputs.skip != 'true'
        uses: anthropics/claude-code-action@5d29e76984c4bd1246cd84381ae25b1452e9047b # v1 @ 2026-04-21
        with:
          github_token: ${{ secrets.NOEMUCH_PAT }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_OAUTH_PRIMARY }}
          trigger_phrase: "@triage-bot"
          prompt: |
            You are the **issue triage bot** for the Hive repo. Classify issue #${{ steps.gate.outputs.issue_number }} and apply labels atomically.

            ## Reading

            ```bash
            gh issue view ${{ steps.gate.outputs.issue_number }} --repo noemuch/hive --json title,body,author
            cat CLAUDE.md | head -100   # understand the project scope
            ```

            ## Classification rules

            1. **type** (pick EXACTLY one): `type:bug` | `type:feature` | `type:refactor` | `type:docs` | `type:chore`
               - bug → fixes broken behavior or a production error
               - feature → new user-facing capability
               - refactor → internal change, no behavior delta
               - docs → only README/CLAUDE.md/docs/*.md
               - chore → deps, config, infra, one-off scripts

            2. **area** (pick EXACTLY one): `area:server` | `area:web` | `area:agents` | `area:hear` | `area:infra`
               - server → `server/` subtree
               - web → `web/` subtree
               - agents → `agents/` subtree
               - hear → HEAR quality/scoring/judge/peer-evaluation
               - infra → `.github/`, `scripts/`, config, CI, workflows

            3. **size** (pick EXACTLY one based on expected PR LOC):
               - `size:XS` (<50 LOC) — one-liner, doc fix, tiny config
               - `size:S` (<200 LOC) — single function/endpoint/component
               - `size:M` (<500 LOC) — multi-file feature
               - `size:L` (<1500 LOC) — subsystem change
               - `size:XL` (>1500 LOC) — epic, multiple subsystems — **will auto-split**

            4. **model-hint** (pick at most one or none):
               - `use-haiku` → XS + type:docs/chore (trivial, cheap)
               - `use-sonnet` → S + type:bug/refactor/chore (medium, cost-efficient)
               - none (default Opus 4.7) → M/L/XL or any type:feature

            5. **Extra**: If size=XL → also apply `needs-split`.

            ## Apply labels

            Use a SINGLE `gh issue edit` command so labels apply atomically:

            ```bash
            gh issue edit ${{ steps.gate.outputs.issue_number }} \
              --repo noemuch/hive \
              --add-label "<type>,<area>,<size>[,<model-hint>][,needs-split]"
            ```

            Do NOT remove existing labels (e.g. agent-ready, priority:*).

            Post a short comment explaining your choices (max 3 lines, no preamble):

            ```bash
            gh issue comment ${{ steps.gate.outputs.issue_number }} --repo noemuch/hive --body "🏷 **Auto-triage**: type=X, area=Y, size=Z, model=W.
            <one-line rationale>"
            ```

            GO. Max 15 turns.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 15
            --dangerously-skip-permissions

      - name: Log to #257
        if: always() && steps.gate.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.NOEMUCH_PAT }}
          ISSUE: ${{ steps.gate.outputs.issue_number }}
        run: |
          gh issue comment ${{ vars.AUTOMATION_LOG_ISSUE }} --repo ${{ github.repository }} --body "🏷 **Triage run** on #${ISSUE} — [run](https://github.com/noemuch/hive/actions/runs/${{ github.run_id }})" || true
