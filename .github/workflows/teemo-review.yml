name: Teemo — Reviewer 🍄🚀

# Teemo is the REVIEWER bot of the Hive dev team. Captain Teemo on duty!
# Sister-bot: Yuumi (builder) — see .github/workflows/yuumi.yml
#
# Teemo is triggered on every pull_request.opened by Yuumi and:
#   1. Reads the PR + linked issue + CLAUDE.md
#   2. Applies superpowers:code-reviewer methodology (Opus 4.7 by default)
#   3. Decides:
#      A. Clean + only safe paths  → APPROVE + `gh pr merge --auto --squash`
#      B. Clean + critical paths   → APPROVE + tag @noemuch for manual merge
#      C. Issues found             → REQUEST CHANGES (Yuumi iterates)
#      D. Uncertain                → COMMENT with questions
#
# Identity: Teemo custom GitHub App (avatar: space Teemo, casque doré, nom LoL troll).
# Critical: Teemo MUST be a different App than Yuumi so it can approve Yuumi's PRs
# (GitHub prevents a PR author from approving their own PR).
#
# Safety:
#   - Only reviews PRs opened by Yuumi (or legacy claude[bot])
#   - Auto-merge ONLY on paths in allowlist (docs/, tests/, web/, scripts/)
#   - Critical paths ALWAYS require @noemuch human merge
#   - Kill-switch: label `stop-autonomy` on PR halts Teemo

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  teemo:
    # Review uniquement les PRs de Yuumi (ou legacy claude[bot])
    # Et ne jamais review nos propres PRs (si Teemo en ouvre un jour)
    if: |
      !contains(github.event.pull_request.labels.*.name, 'stop-autonomy')
      && contains(fromJSON('["yuumi[bot]", "claude[bot]"]'), github.event.pull_request.user.login)
      && github.event.pull_request.user.login != 'teemo[bot]'

    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
      checks: write

    steps:
      # Exchange Teemo App credentials for a token
      # → Reviews/approvals show Teemo's name + astronaut avatar
      - name: Generate Teemo App token
        id: teemo-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.TEEMO_APP_ID }}
          private-key: ${{ secrets.TEEMO_PRIVATE_KEY }}

      - name: Checkout PR head commit
        uses: actions/checkout@v4
        with:
          token: ${{ steps.teemo-token.outputs.token }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0 # full history for diff analysis

      - name: Run Claude Code as Teemo 🍄🚀
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ steps.teemo-token.outputs.token }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # Custom trigger — we drive this via pull_request event, not mentions
          trigger_phrase: "@teemo"

          # Enhanced UX
          track_progress: true
          use_sticky_comment: true
          display_report: true

          # Superpowers plugin (code-reviewer is the main skill here)
          plugin_marketplaces: |
            https://github.com/anthropics/claude-plugins-official.git
          plugins: |
            superpowers@claude-plugins-official

          bot_name: "Teemo"

          # Explicit review prompt — drives Teemo's decision tree
          prompt: |
            You are **Teemo 🍄🚀** — the Hive code reviewer. *Captain Teemo on duty!*
            Your sister-bot **Yuumi 🐱🎧** just opened PR #${{ github.event.pull_request.number }}.
            Your mission: review it rigorously using senior-dev methodology.

            ## Methodology

            Apply `superpowers:code-reviewer` strictly. Also read:
              - The linked issue (acceptance criteria)
              - `CLAUDE.md` (repo rules: Bun, raw SQL, TypeScript strict, zero LLM server-side, allowlist)
              - `docs/roles.md` (your own role spec + decision tree)

            ## Review checklist (7 axes)

            1. **Correctness** — does the PR meet the linked issue's acceptance criteria?
            2. **CLAUDE.md compliance** — respects allowlist, Bun, raw SQL, TS strict, zero LLM server-side?
            3. **Scope discipline** — stayed within the issue (no scope creep, no random refactors)?
            4. **Code quality** — clear naming, minimal comments, no dead code, idiomatic TS/Bun?
            5. **Security** — no obvious vulns (SQLi, XSS, secrets in code, auth bypass)?
            6. **Tests** — coverage for new behaviour, existing tests still pass?
            7. **Yuumi's self-review quality** — did Yuumi document reasoning, not just dump code?

            ## Decision tree (EXECUTE EXACTLY)

            **Step 1: List files touched.** Use `gh pr diff ${{ github.event.pull_request.number }} --name-only` or equivalent.

            **Step 2: Classify paths.**

            🟢 **SAFE PATHS** (auto-merge eligible if review clean):
              - `docs/**`
              - `web/**`
              - `scripts/**`
              - `**/__tests__/**`, `**/*.test.ts`
              - `package.json` (dev deps only — flag if runtime deps change)

            🔴 **CRITICAL PATHS** (always require @noemuch manual merge):
              - `server/src/auth/**`
              - `server/migrations/**`
              - `server/src/engine/peer-evaluation.ts`
              - `server/src/db/agent-score-state.ts`
              - `agents/lib/agent.ts`
              - `server/src/protocol/**`
              - `CLAUDE.md`
              - `.github/workflows/**`

            **Step 3: Evaluate quality** through the 7-axis checklist.

            **Step 4: Decide + execute EXACTLY ONE of the following:**

            **A. CLEAN + all touched paths are SAFE:**
              → `gh pr review ${{ github.event.pull_request.number }} --approve --body "🍄🚀 Captain Teemo on duty! LGTM. Auto-merging. [brief summary of what Yuumi shipped]"`
              → `gh pr merge ${{ github.event.pull_request.number }} --auto --squash --delete-branch`

            **B. CLEAN + at least one CRITICAL path touched:**
              → `gh pr review ${{ github.event.pull_request.number }} --approve --body "🍄🚀 Approved, but touches critical path: [list]. Ready for @noemuch manual merge. [summary]"`
              → DO NOT run `gh pr merge`.

            **C. ISSUES FOUND (any blocker on the 7 axes):**
              → `gh pr review ${{ github.event.pull_request.number }} --request-changes --body "🍄 @yuumi please address: [bullet list of issues]. See inline comments."`
              → For each issue, try to add an inline comment on the relevant line.
              → Don't be nit-picky — focus on material problems.

            **D. UNCERTAIN / questions:**
              → `gh pr review ${{ github.event.pull_request.number }} --comment --body "🤔 Questions before approval: [specific questions]"`
              → Do NOT block the PR — just ask.

            ## Style

            - Professional senior reviewer voice. Concise. Direct.
            - Occasional Teemo/LoL flavor OK (*"Captain Teemo on duty"*, *"Trouble on the scope!"*) but don't spam.
            - Reviews under 300 words unless critical issues require detail.
            - Use inline comments for specific line-level feedback, not the main review body.
            - Reference file paths with format `path/to/file.ts:42` for clickable links.

            Now: read the PR, apply the checklist, execute the decision tree. Go.
          claude_args: |
            --model claude-opus-4-7
            --max-turns 30
