[build]
builder = "NIXPACKS"

[deploy]
numReplicas = 1
sleepApplication = false
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/health"
# 10s was too aggressive — Next.js cold-start + route handler compile was
# taking longer than the window, so Railway marked deploys as failure even
# though /health was reachable publicly within ~30s. Bumped to 300s (max
# on Railway) so healthcheck gets plenty of retries during warmup.
healthcheckTimeout = 300
